<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablo TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #eee; }

    header { background: #16213e; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 20px; font-weight: 600; }
    header nav { display: flex; gap: 8px; }
    header nav button {
      background: none; border: 1px solid #444; color: #ccc;
      padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    header nav button.active { background: #0f3460; border-color: #0f3460; color: #fff; }

    .container { display: flex; height: calc(100vh - 56px); }

    .sidebar {
      width: 320px; min-width: 320px; overflow-y: auto;
      background: #16213e; border-right: 1px solid #333; padding: 8px 0;
    }

    .channel-item, .recording-item {
      padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #222;
      transition: background 0.15s;
    }
    .channel-item:hover, .recording-item:hover { background: #1a1a3e; }
    .channel-item.active, .recording-item.active { background: #0f3460; }
    .channel-number { font-weight: 700; color: #e94560; margin-right: 8px; }
    .channel-name { font-weight: 500; }
    .channel-now { font-size: 12px; color: #999; margin-top: 2px; }
    .recording-title { font-weight: 500; }
    .recording-episode { font-size: 13px; color: #bbb; }
    .recording-meta { font-size: 12px; color: #888; margin-top: 2px; }

    .player-area {
      flex: 1; display: flex; flex-direction: column; background: #000; position: relative;
    }
    video { width: 100%; flex: 1; background: #000; }

    .controls {
      display: none; background: #111; padding: 8px 16px;
      flex-direction: column; gap: 6px;
    }
    .controls.visible { display: flex; }

    .seek-row { display: flex; align-items: center; gap: 10px; }
    .seek-bar-wrap {
      flex: 1; height: 20px; cursor: pointer; display: flex; align-items: center;
    }
    .seek-bar {
      width: 100%; height: 6px; background: #333; border-radius: 3px;
      position: relative; overflow: visible;
    }
    .seek-fill {
      height: 100%; background: #e94560; border-radius: 3px; position: absolute; left: 0; top: 0;
    }
    .seek-buffered {
      height: 100%; background: #666; border-radius: 3px; position: absolute; left: 0; top: 0;
    }
    .seek-live-area {
      height: 100%; background: #444; border-radius: 3px; position: absolute; left: 0; top: 0;
      display: none;
    }
    .seek-live-edge {
      position: absolute; top: -6px; width: 3px; height: calc(100% + 12px);
      background: #e94560; border-radius: 1px; z-index: 3; display: none;
      box-shadow: 0 0 4px rgba(233, 69, 96, 0.6); pointer-events: none;
    }
    .seek-live-label {
      position: absolute; top: -20px; transform: translateX(-50%);
      font-size: 10px; color: #e94560; font-weight: 700; text-transform: uppercase;
      pointer-events: none; display: none; letter-spacing: 0.5px;
    }
    .seek-bar-wrap:hover .seek-bar { height: 10px; }
    .seek-tooltip {
      position: absolute; top: -28px; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; font-size: 12px;
      padding: 3px 7px; border-radius: 3px; pointer-events: none;
      white-space: nowrap; display: none; font-variant-numeric: tabular-nums;
    }
    .seek-bar-wrap:hover .seek-tooltip { display: block; }
    .time-label { font-size: 13px; color: #aaa; font-variant-numeric: tabular-nums; white-space: nowrap; }

    .btn-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-row button {
      background: none; border: none; color: #ddd; font-size: 15px;
      cursor: pointer; padding: 4px 10px; border-radius: 4px; font-weight: 600;
    }
    .btn-row button:hover { background: rgba(255,255,255,0.1); }
    .btn-row button.play-btn { font-size: 22px; padding: 4px 14px; }
    .btn-row button.live-btn {
      background: #555; color: #fff; font-size: 12px; padding: 3px 10px;
      border-radius: 3px; margin-left: 12px; text-transform: uppercase; font-weight: 700;
      letter-spacing: 0.5px;
    }
    .btn-row button.live-btn.at-live { background: #e94560; }
    .btn-row button.live-btn.hidden { display: none; }
    .btn-row .spacer { flex: 1; }
    .volume-group { display: flex; align-items: center; gap: 4px; }
    .volume-group button { font-size: 18px; color: #999; background: none; border: none; cursor: pointer; padding: 4px 6px; }
    .volume-group button:hover { color: #fff; }
    .volume-slider {
      width: 80px; height: 4px; accent-color: #e94560; cursor: pointer;
      -webkit-appearance: none; appearance: none; background: #444; border-radius: 2px; outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #eee; border-radius: 50%; cursor: pointer;
    }
    .btn-row button.screen-btn { font-size: 18px; color: #999; }
    .btn-row button.screen-btn:hover { color: #fff; }

    /* Theater mode */
    body.theater .sidebar { display: none; }
    body.theater header { display: none; }
    body.theater .container { height: 100vh; }

    /* Fullscreen tweaks - player area as fullscreen element */
    .player-area:fullscreen, .player-area:-webkit-full-screen { background: #000; }
    .player-area:fullscreen video, .player-area:-webkit-full-screen video {
      width: 100%; height: 100%; object-fit: contain;
    }
    .player-area:fullscreen .controls, .player-area:-webkit-full-screen .controls {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(0,0,0,0.7);
    }
    /* Fullscreen tweaks - video element as fullscreen element */
    video:fullscreen, video:-webkit-full-screen {
      width: 100%; height: 100%; object-fit: contain;
    }

    .status { position: absolute; color: #888; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .status.hidden { display: none; }
    .loading { position: absolute; color: #e94560; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .loading.hidden { display: none; }
    .buffering { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); display: none; z-index: 10; }
    .buffering.visible { display: block; }
    .buffering .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { position: absolute; color: #e94560; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; max-width: 80%; }

    .sidebar-search {
      padding: 8px 12px; position: sticky; top: 0; background: #16213e; z-index: 1;
      display: flex; gap: 8px; align-items: center;
    }
    .sidebar-search input {
      flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #444;
      background: #1a1a2e; color: #eee; font-size: 14px;
    }
    .gear-btn {
      background: none; border: none; color: #888; font-size: 20px;
      cursor: pointer; padding: 2px 4px; line-height: 1;
    }
    .gear-btn:hover { color: #eee; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #16213e; border-radius: 8px; padding: 20px; width: 500px;
      max-height: 80vh; display: flex; flex-direction: column;
    }
    .modal h2 { font-size: 16px; margin-bottom: 12px; }
    .modal-search {
      width: 100%; padding: 6px 10px; border-radius: 4px; border: 1px solid #444;
      background: #1a1a2e; color: #eee; font-size: 14px; margin-bottom: 10px;
    }
    .modal-list {
      flex: 1; overflow-y: auto; max-height: 50vh;
    }
    .modal-ch {
      display: flex; align-items: center; gap: 10px; padding: 6px 8px;
      cursor: pointer; border-radius: 4px;
    }
    .modal-ch:hover { background: #1a1a3e; }
    .modal-ch input { accent-color: #e94560; width: 16px; height: 16px; cursor: pointer; }
    .modal-ch .ch-num { font-weight: 700; color: #e94560; min-width: 40px; }
    .modal-actions {
      display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
    }
    .modal-actions button {
      padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 14px;
      border: 1px solid #444; background: none; color: #ccc;
    }
    .modal-actions button.primary { background: #0f3460; border-color: #0f3460; color: #fff; }

    .guide-container {
      height: calc(100vh - 56px); overflow: hidden; display: flex; flex-direction: column;
    }
    .guide-toolbar {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      background: #16213e; border-bottom: 1px solid #333;
    }
    .guide-toolbar button {
      background: none; border: 1px solid #444; color: #ccc;
      padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .guide-toolbar button:hover { background: #0f3460; }
    #guideDate { color: #aaa; font-size: 14px; margin-left: auto; }
    .guide-grid { flex: 1; overflow: auto; }
    .guide-time-row, .guide-row { display: flex; border-bottom: 1px solid #222; }
    .guide-ch-label {
      width: 110px; min-width: 110px; padding: 8px 10px; font-size: 13px;
      background: #16213e; position: sticky; left: 0; z-index: 2;
      display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden;
      border-right: 1px solid #333;
    }
    .guide-time-row .guide-ch-label { border-bottom: 1px solid #333; }
    .guide-programs { position: relative; height: 52px; flex-shrink: 0; }
    .guide-time-row .guide-programs { height: 30px; }
    .guide-time-mark {
      position: absolute; top: 0; font-size: 11px; color: #888; padding: 6px 8px;
      border-left: 1px solid #333; height: 100%;
    }
    .guide-program {
      position: absolute; top: 2px; height: calc(100% - 4px);
      background: #1e3a5f; border-radius: 3px; padding: 4px 8px;
      overflow: hidden; cursor: pointer; font-size: 12px;
      display: flex; flex-direction: row; align-items: center;
      border: 1px solid #2a4a6f;
    }
    .guide-prog-text {
      flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;
    }
    .guide-program:hover { background: #264d73; border-color: #3a6a9f; z-index: 1; }
    .guide-program.on-now { background: #2e1a3e; border-color: #e94560; }
    .guide-prog-title {
      font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .guide-prog-ep {
      font-size: 11px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .guide-now-line {
      position: absolute; top: 0; bottom: 0; width: 2px; background: #e94560; z-index: 1;
      pointer-events: none;
    }
    .btn-row button.rec-btn {
      color: #999; font-size: 18px; padding: 4px 8px; margin-left: 4px;
      transition: color 0.2s;
    }
    .btn-row button.rec-btn:hover { color: #e94560; }
    .btn-row button.rec-btn.recording { color: #e94560; }
    .btn-row button.rec-btn.hidden { display: none; }
    .rec-menu {
      position: fixed; z-index: 200; background: #16213e; border: 1px solid #444;
      border-radius: 6px; padding: 4px 0; min-width: 180px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .rec-menu button {
      display: block; width: 100%; text-align: left; padding: 8px 16px;
      background: none; border: none; color: #eee; font-size: 14px; cursor: pointer;
    }
    .rec-menu button:hover { background: #0f3460; }
    .rec-menu button.danger { color: #e94560; }
    .rec-delete-btn {
      float: right; color: #666; font-size: 13px; cursor: pointer;
      padding: 0 4px; line-height: 1;
    }
    .rec-delete-btn:hover { color: #e94560; }
    .ch-rec-dot {
      color: #e94560; font-size: 10px; font-weight: 700; margin-left: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .guide-rec-btn {
      flex-shrink: 0; font-size: 14px; color: #666; cursor: pointer;
      margin-left: 4px; line-height: 1; padding: 2px;
    }
    .guide-rec-btn:hover { color: #e94560; }
    .guide-rec-btn.recording { color: #e94560; }
  </style>
</head>
<body>
  <header>
    <h1>Tablo TV</h1>
    <nav>
      <button id="btn-live" class="active" onclick="showTab('live')">Live TV</button>
      <button id="btn-recordings" onclick="showTab('recordings')">Recordings</button>
      <button id="btn-guide" onclick="showTab('guide')">Guide</button>
    </nav>
  </header>

  <div class="container">
    <div class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="search" placeholder="Search..." oninput="filterList()">
        <button class="gear-btn" onclick="openChannelPicker()" title="Edit channels">&#9881;</button>
      </div>
      <div id="channel-list"></div>
      <div id="recording-list" style="display:none"></div>
    </div>
    <div class="player-area">
      <div class="status" id="status">Select a channel or recording to start watching</div>
      <div class="loading hidden" id="loading">Loading stream...</div>
      <div class="error-msg" id="error"></div>
      <video id="video" autoplay></video>
      <div class="buffering" id="buffering"><div class="spinner"></div></div>
      <div class="controls" id="controls">
        <div class="seek-row" id="seekRow">
          <span class="time-label" id="timeCurrent">0:00</span>
          <div class="seek-bar-wrap" id="seekWrap">
            <div class="seek-bar">
              <div class="seek-live-area" id="seekLiveArea"></div>
              <div class="seek-buffered" id="seekBuffered"></div>
              <div class="seek-fill" id="seekFill"></div>
              <div class="seek-live-edge" id="seekLiveEdge"></div>
              <div class="seek-live-label" id="seekLiveLabel">LIVE</div>
              <div class="seek-tooltip" id="seekTooltip">0:00</div>
            </div>
          </div>
          <span class="time-label" id="timeTotal">0:00</span>
        </div>
        <div class="btn-row">
          <button onclick="seekTo(-60)">-60s</button>
          <button onclick="seekTo(-10)">-10s</button>
          <button class="play-btn" onclick="togglePlay()" id="playpause">&#9208;</button>
          <button onclick="seekTo(10)">+10s</button>
          <button onclick="seekTo(60)">+60s</button>
          <button class="live-btn hidden" id="liveBtn" onclick="goLive()">Live</button>
          <button class="rec-btn hidden" id="recBtn" onclick="toggleRecord(event)" title="Record">&#9679;</button>
          <span class="spacer"></span>
          <span class="volume-group">
            <button onclick="toggleMute()" id="muteBtn" title="Mute">&#128264;</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
          </span>
          <button class="screen-btn" onclick="toggleTheater()" id="theaterBtn" title="Theater mode">&#9645;</button>
          <button class="screen-btn" onclick="toggleFullscreen()" id="fullscreenBtn" title="Fullscreen">&#9974;</button>
        </div>
      </div>
    </div>
  </div>

  <div class="guide-container" id="guide-container" style="display:none">
    <div class="guide-toolbar">
      <button onclick="guideNav(-3)">&laquo; 3h</button>
      <button onclick="guideNow()">Now</button>
      <button onclick="guideNav(3)">3h &raquo;</button>
      <span id="guideDate"></span>
    </div>
    <div class="guide-grid" id="guideGrid"></div>
  </div>

  <div class="modal-overlay" id="channelModal" onclick="if(event.target===this)closeChannelPicker()">
    <div class="modal">
      <h2>Select Channels</h2>
      <input type="text" class="modal-search" id="modalSearch" placeholder="Filter..." oninput="filterModal()">
      <div class="modal-list" id="modalList"></div>
      <div class="modal-actions">
        <button onclick="selectAllVisible()">All</button>
        <button onclick="selectNoneVisible()">None</button>
        <button class="primary" onclick="saveChannelPicker()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let channels = [];
    let recordings = [];
    let guideData = {};
    let currentTab = 'live';
    let hls = null;
    let currentSessionId = null;
    let totalDuration = 0;     // full recording duration from metadata (seconds)
    let serverOffset = 0;      // where FFmpeg started transcoding from (seconds)
    let isLive = false;
    let liveRecording = null; // non-null when watching a live channel that's being recorded
    let favorites = []; // empty = show all
    let currentRecordingId = null;
    let seriesIndex = {}; // cloudShowId -> { path, title, schedule }
    let currentShowId = null; // cloud show ID of what's playing live
    let tunerStatus = []; // active tuner info from device

    // Resume position tracking — save to localStorage every 5 seconds
    function saveResumePosition() {
      if (!currentRecordingId) return;
      const v = document.getElementById('video');
      const pos = serverOffset + (v.currentTime || 0);
      if (pos > 5) localStorage.setItem('resume_' + currentRecordingId, String(Math.floor(pos)));
    }
    function getResumePosition(recordingId) {
      return parseInt(localStorage.getItem('resume_' + recordingId) || '0', 10);
    }
    function saveWatchState() {
      const state = { tab: currentTab };
      if (currentRecordingId) {
        state.recordingId = currentRecordingId;
      } else {
        const activeCh = document.querySelector('.channel-item.active');
        if (activeCh) state.channelId = activeCh.dataset.id;
      }
      localStorage.setItem('watchState', JSON.stringify(state));
    }
    setInterval(() => { saveResumePosition(); saveWatchState(); }, 5000);
    window.addEventListener('beforeunload', () => { saveResumePosition(); saveWatchState(); });

    async function init() {
      try {
        const [chRes, recRes, guideRes, favRes, seriesRes, tunerRes] = await Promise.all([
          fetch('/api/channels'),
          fetch('/api/recordings'),
          fetch('/api/guide'),
          fetch('/api/favorites'),
          fetch('/api/series'),
          fetch('/api/tuners'),
        ]);
        channels = await chRes.json();
        recordings = await recRes.json();
        guideData = await guideRes.json();
        favorites = await favRes.json();
        seriesIndex = await seriesRes.json();
        tunerStatus = await tunerRes.json();
      } catch (e) {
        showError('Failed to load data: ' + e.message);
      }
      renderChannels();
      renderRecordings();

      // Restore last watch state on refresh
      try {
        const saved = JSON.parse(localStorage.getItem('watchState') || '{}');
        if (saved.tab) showTab(saved.tab);
        if (saved.recordingId) {
          const rec = recordings.find(r => String(r.id) === String(saved.recordingId));
          if (rec) {
            const el = document.querySelector(`.recording-item[data-id="${saved.recordingId}"]`);
            playRecording(saved.recordingId, rec.duration, el || document.createElement('div'));
          }
        } else if (saved.channelId) {
          const el = document.querySelector(`.channel-item[data-id="${saved.channelId}"]`);
          if (el) playChannel(saved.channelId, el);
        }
      } catch (e) {
        console.warn('Failed to restore watch state:', e);
      }
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function renderChannels() {
      const list = document.getElementById('channel-list');
      const visible = favorites.length > 0 ? channels.filter(ch => favorites.includes(ch.id)) : channels;
      list.innerHTML = visible.map(ch => {
        const now = getCurrentAiring(ch.id);
        const rec = isChannelRecording(ch.id);
        const search = `${ch.number} ${ch.name} ${ch.callSign}`.toLowerCase();
        return `<div class="channel-item" data-id="${ch.id}" data-search="${esc(search)}" onclick="playChannel('${esc(ch.id)}', this)">
          <div><span class="channel-number">${esc(ch.number)}</span><span class="channel-name">${esc(ch.name)}</span>${rec ? '<span class="ch-rec-dot">REC</span>' : ''}</div>
          ${now ? `<div class="channel-now">${esc(now)}</div>` : ''}
        </div>`;
      }).join('');
    }

    function renderRecordings() {
      const list = document.getElementById('recording-list');
      list.innerHTML = recordings.map(rec => {
        const date = rec.date ? new Date(rec.date).toLocaleDateString() : '';
        const dur = rec.duration ? Math.round(rec.duration / 60) + ' min' : '';
        const resume = getResumePosition(rec.id);
        const resumeText = resume > 10 && rec.duration && resume < rec.duration - 30
          ? fmt(resume) + ' / ' + fmt(rec.duration)
          : '';
        const meta = [rec.channel, date, dur].filter(Boolean).join(' - ');
        const epInfo = rec.seasonNumber && rec.episodeNumber
          ? `S${rec.seasonNumber}E${rec.episodeNumber}: ${rec.episode}`
          : rec.episode;
        const search = `${rec.title} ${rec.episode}`.toLowerCase();
        return `<div class="recording-item" data-id="${rec.id}" data-search="${esc(search)}" data-duration="${rec.duration}" onclick="playRecording('${rec.id}', ${rec.duration}, this)">
          <div class="recording-title">${esc(rec.title)}<span class="rec-delete-btn" onclick="deleteRec('${rec.id}', event)" title="Delete recording">&#10005;</span>${resumeText ? `<span style="float:right;font-size:11px;color:#e94560;margin-right:8px">${resumeText}</span>` : ''}</div>
          ${epInfo ? `<div class="recording-episode">${esc(epInfo)}</div>` : ''}
          ${meta ? `<div class="recording-meta">${esc(meta)}</div>` : ''}
        </div>`;
      }).join('');
    }

    function getCurrentAiring(channelId) {
      const airings = guideData[channelId];
      if (!airings || !airings.length) return null;
      const now = Date.now();
      const current = airings.find(a => {
        const start = new Date(a.datetime || a.start).getTime();
        const end = start + ((a.duration || 1800) * 1000);
        return now >= start && now <= end;
      });
      return current ? (current.title || current.series_title || '') : null;
    }

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('btn-live').classList.toggle('active', tab === 'live');
      document.getElementById('btn-recordings').classList.toggle('active', tab === 'recordings');
      document.getElementById('btn-guide').classList.toggle('active', tab === 'guide');

      const mainContainer = document.querySelector('.container');
      const guideContainer = document.getElementById('guide-container');

      if (tab === 'guide') {
        mainContainer.style.display = 'none';
        guideContainer.style.display = 'flex';
        renderGuide();
      } else {
        mainContainer.style.display = 'flex';
        guideContainer.style.display = 'none';
        document.getElementById('channel-list').style.display = tab === 'live' ? 'block' : 'none';
        document.getElementById('recording-list').style.display = tab === 'recordings' ? 'block' : 'none';
        document.getElementById('search').value = '';
        filterList();
        if (tab === 'recordings') refreshRecordings();
      }
    }

    async function refreshRecordings() {
      try {
        await fetch('/api/refresh', { method: 'POST' });
        const res = await fetch('/api/recordings');
        recordings = await res.json();
        renderRecordings();
      } catch (e) {
        console.warn('Failed to refresh recordings:', e);
      }
    }

    function filterList() {
      const q = document.getElementById('search').value.toLowerCase();
      const listId = currentTab === 'live' ? 'channel-list' : 'recording-list';
      const items = document.getElementById(listId).children;
      for (const item of items) {
        const text = item.getAttribute('data-search') || '';
        item.style.display = text.includes(q) ? '' : 'none';
      }
    }

    async function deleteRec(recordingId, event) {
      event.stopPropagation();
      const rec = recordings.find(r => String(r.id) === String(recordingId));
      const name = rec ? `${rec.title}${rec.episode ? ' - ' + rec.episode : ''}` : 'this recording';
      if (!confirm(`Delete ${name}?`)) return;
      try {
        await fetch('/api/recording/' + recordingId, { method: 'DELETE' });
        recordings = recordings.filter(r => String(r.id) !== String(recordingId));
        renderRecordings();
      } catch (e) {
        console.error('Delete failed:', e);
      }
    }

    function isChannelRecording(channelId) {
      return tunerStatus.some(t => t.in_use && t.recording && t.channel === '/guide/channels/' + channelId);
    }

    async function refreshTuners() {
      try {
        tunerStatus = await (await fetch('/api/tuners')).json();
      } catch (e) {}
    }
    setInterval(refreshTuners, 30000);

    function updateRecBtn() {
      const btn = document.getElementById('recBtn');
      if (!isLive || !currentShowId) {
        btn.classList.add('hidden');
        return;
      }
      btn.classList.remove('hidden');
      const entry = seriesIndex[currentShowId];
      const isRec = entry && entry.schedule !== 'none';
      btn.classList.toggle('recording', isRec);
      btn.title = isRec ? 'Cancel recording' : 'Record this show';
    }

    function toggleRecord(event) {
      if (!currentShowId) return;
      // Find the current airing datetime for single-episode option
      const activeCh = document.querySelector('.channel-item.active');
      let airingDatetime = null;
      if (activeCh) {
        const chId = activeCh.dataset.id;
        const airings = guideData[chId] || guideData[Number(chId)] || [];
        const now = Date.now();
        const current = airings.find(a => {
          const start = new Date(a.datetime).getTime();
          return now >= start && now <= start + (a.duration || 1800) * 1000;
        });
        if (current) airingDatetime = current.datetime;
      }
      toggleRecordShow(currentShowId, event || { clientX: 200, clientY: 200, stopPropagation(){}, preventDefault(){} }, airingDatetime);
    }

    function closeRecMenu() {
      const old = document.getElementById('recMenu');
      if (old) old.remove();
      document.removeEventListener('click', closeRecMenu);
    }

    function toggleRecordShow(showId, event, airingDatetime) {
      if (event) { event.stopPropagation(); event.preventDefault(); }
      closeRecMenu();

      const entry = seriesIndex[showId];
      const isSeriesRec = entry && entry.schedule !== 'none';

      const menu = document.createElement('div');
      menu.className = 'rec-menu';
      menu.id = 'recMenu';

      let html = '';
      if (airingDatetime) {
        html += `<button onclick="doRecordAction('single', '${escAttr(showId)}', '${escAttr(airingDatetime)}')">Record this episode</button>`;
      }
      if (isSeriesRec) {
        html += `<button class="danger" onclick="doRecordAction('cancel-series', '${escAttr(showId)}')">Cancel series recording</button>`;
      } else {
        html += `<button onclick="doRecordAction('series-new', '${escAttr(showId)}')">Record new episodes</button>`;
        html += `<button onclick="doRecordAction('series-all', '${escAttr(showId)}')">Record all episodes</button>`;
      }
      menu.innerHTML = html;

      // Position near the click
      menu.style.left = Math.min(event.clientX, window.innerWidth - 200) + 'px';
      menu.style.top = Math.min(event.clientY, window.innerHeight - 150) + 'px';
      document.body.appendChild(menu);
      setTimeout(() => document.addEventListener('click', closeRecMenu), 0);
    }

    async function doRecordAction(action, showId, datetime) {
      closeRecMenu();
      const entry = seriesIndex[showId];
      try {
        if (action === 'single') {
          const res = await fetch('/api/record-airing', { method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ showId, datetime })
          });
          const data = await res.json();
          if (data.error) { showError(data.error); return; }
        } else if (action === 'series-new' || action === 'series-all') {
          const rule = action === 'series-new' ? 'new' : 'all';
          await fetch('/api/record/' + encodeURIComponent(showId), { method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rule })
          });
          if (entry) entry.schedule = rule;
        } else if (action === 'cancel-series') {
          await fetch('/api/record/' + encodeURIComponent(showId), { method: 'DELETE' });
          if (entry) entry.schedule = 'none';
        }
        updateRecBtn();
        if (currentTab === 'guide') renderGuide();
      } catch (e) {
        console.error('Record action failed:', e);
      }
    }

    async function playChannel(channelId, el) {
      clearActive();
      if (el) el.classList.add('active');
      isLive = true;
      liveRecording = null;
      currentShowId = null;

      // Find what's on now and set currentShowId for the record button
      const ch = channels.find(c => c.id === channelId || String(c.id) === String(channelId));
      if (ch) {
        const now = Date.now();
        liveRecording = recordings.find(r => {
          if (!r.channel.startsWith(ch.number + ' ')) return false;
          const start = new Date(r.date).getTime();
          const end = start + r.duration * 1000;
          return now >= start && now <= end;
        }) || null;

        // Find current airing's show ID for recording
        const airings = guideData[ch.id] || [];
        const currentAiring = airings.find(a => {
          const start = new Date(a.datetime || a.start).getTime();
          const end = start + ((a.duration || 1800) * 1000);
          return now >= start && now <= end;
        });
        if (currentAiring?.show?.identifier) {
          currentShowId = currentAiring.show.identifier;
        }
      }
      updateRecBtn();

      if (liveRecording) {
        // Play the recording stream seeked to the live edge
        totalDuration = liveRecording.duration;
        currentRecordingId = liveRecording.id;
        const recStart = new Date(liveRecording.date).getTime();
        const liveOffset = Math.max(0, (Date.now() - recStart) / 1000 - 5);
        await playRecordingAtOffset(liveRecording.id, liveOffset);
      } else {
        totalDuration = 0;
        serverOffset = 0;
        await playHls(`/stream/hls/channel/${channelId}`);
      }
    }

    async function playRecordingAtOffset(recordingId, offset) {
      const video = document.getElementById('video');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');
      const error = document.getElementById('error');

      status.classList.add('hidden');
      loading.classList.remove('hidden');
      loading.textContent = 'Loading stream...';
      error.textContent = '';

      if (hls) { hls.destroy(); hls = null; }

      try {
        const res = await fetch(`/stream/hls/recording/${recordingId}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        currentSessionId = data.sessionId;

        // Seek to the live offset
        loading.textContent = 'Seeking to live...';
        const seekRes = await fetch(`/api/seek/${currentSessionId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ offset }),
        });
        const seekData = await seekRes.json();
        serverOffset = seekData.startOffset;

        loading.textContent = 'Transcoding stream...';
        await waitForPlaylist(seekData.url);
        loadHls(seekData.url, video, loading);
      } catch (e) {
        loading.classList.add('hidden');
        loading.textContent = 'Loading stream...';
        showError('Failed to start stream: ' + e.message);
      }
    }

    async function playRecording(recordingId, duration, el) {
      clearActive();
      el.classList.add('active');
      totalDuration = duration;
      currentRecordingId = recordingId;
      currentShowId = null;
      updateRecBtn();

      // Detect if this recording is currently in progress
      const rec = recordings.find(r => String(r.id) === String(recordingId));
      if (rec) {
        const now = Date.now();
        const start = new Date(rec.date).getTime();
        const end = start + rec.duration * 1000;
        if (now >= start && now <= end) {
          isLive = true;
          liveRecording = rec;
        } else {
          isLive = false;
          liveRecording = null;
        }
      } else {
        isLive = false;
        liveRecording = null;
      }

      const resume = getResumePosition(recordingId);
      if (resume > 10 && resume < duration - 30) {
        serverOffset = resume;
        await playHls(`/stream/hls/recording/${recordingId}?offset=${resume}`);
      } else {
        serverOffset = 0;
        await playHls(`/stream/hls/recording/${recordingId}`);
      }
    }

    function clearActive() {
      saveResumePosition();
      currentRecordingId = null;
      document.querySelectorAll('.channel-item, .recording-item').forEach(el => el.classList.remove('active'));
    }

    async function playHls(endpoint) {
      const video = document.getElementById('video');
      const status = document.getElementById('status');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');

      status.classList.add('hidden');
      loading.classList.remove('hidden');
      error.textContent = '';

      if (hls) {
        hls.destroy();
        hls = null;
      }

      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        if (data.error) {
          loading.classList.add('hidden');
          loading.textContent = 'Loading stream...';
          showError(data.error);
          return;
        }

        currentSessionId = data.sessionId;
        const playlistUrl = data.url;

        loading.textContent = 'Transcoding stream...';
        await waitForPlaylist(playlistUrl);

        loadHls(playlistUrl, video, loading);
      } catch (e) {
        loading.classList.add('hidden');
        loading.textContent = 'Loading stream...';
        showError('Failed to start stream: ' + e.message);
      }
    }

    function loadHls(playlistUrl, video, loading) {
      if (hls) hls.destroy();

      if (Hls.isSupported()) {
        hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
        hls.loadSource(playlistUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          loading.classList.add('hidden');
          loading.textContent = 'Loading stream...';
          document.getElementById('controls').classList.add('visible');
          const lb = document.getElementById('liveBtn');
          if (isLive) {
            lb.classList.remove('hidden');
            if (liveRecording) {
              const recStart = new Date(liveRecording.date).getTime();
              const liveEdge = (Date.now() - recStart) / 1000;
              const nearLive = liveEdge - serverOffset < 30;
              lb.classList.toggle('at-live', nearLive);
              if (nearLive) video.currentTime = video.duration || 0;
            } else {
              lb.classList.add('at-live');
              video.currentTime = video.duration || 0;
            }
          } else {
            lb.classList.add('hidden');
          }
          video.play().catch(() => {});
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error('[hls.js]', data.type, data.details, data.reason || '', data.err || '');
          if (data.fatal) {
            // Try to recover from fatal errors
            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              console.log('[hls.js] Attempting media error recovery...');
              hls.recoverMediaError();
            } else if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              console.log('[hls.js] Attempting network error recovery...');
              hls.startLoad();
            } else {
              showError('Stream error: ' + data.type + ' (' + data.details + ')');
              loading.classList.add('hidden');
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = playlistUrl;
        video.addEventListener('loadedmetadata', () => {
          loading.classList.add('hidden');
          document.getElementById('controls').classList.add('visible');
          video.play().catch(() => {});
        }, { once: true });
      }
    }

    // Seek relative (skip +/- seconds)
    function seekTo(delta) {
      const v = document.getElementById('video');
      const currentAbsolute = serverOffset + (v.currentTime || 0);

      let maxPos = totalDuration || Infinity;
      if (liveRecording) {
        const recStart = new Date(liveRecording.date).getTime();
        maxPos = (Date.now() - recStart) / 1000 - 5;
      }

      const targetAbsolute = Math.max(0, Math.min(maxPos, currentAbsolute + delta));
      const targetLocal = targetAbsolute - serverOffset;

      // Check what's actually buffered
      const bufEnd = v.buffered.length > 0 ? v.buffered.end(v.buffered.length - 1) : 0;
      const bufStart = v.buffered.length > 0 ? v.buffered.start(0) : 0;

      if (targetLocal >= bufStart && targetLocal <= bufEnd) {
        v.currentTime = targetLocal;
      } else if (targetLocal >= 0 && targetLocal <= bufEnd + 2) {
        v.currentTime = Math.max(0, bufEnd - 0.5);
      } else if (isLive && !liveRecording && targetLocal > bufEnd) {
        v.currentTime = Math.max(0, bufEnd - 0.5);
      } else {
        serverSeek(targetAbsolute);
      }
    }

    // Seek to absolute position in the recording
    async function serverSeek(absoluteSeconds) {
      if (!currentSessionId) return;

      const loading = document.getElementById('loading');
      loading.textContent = 'Seeking...';
      loading.classList.remove('hidden');

      if (hls) { hls.destroy(); hls = null; }

      try {
        const res = await fetch(`/api/seek/${currentSessionId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ offset: absoluteSeconds }),
        });
        const data = await res.json();
        serverOffset = data.startOffset;

        await waitForPlaylist(data.url);
        loadHls(data.url, document.getElementById('video'), loading);
      } catch (e) {
        loading.classList.add('hidden');
        showError('Seek failed: ' + e.message);
      }
    }

    function togglePlay() {
      const v = document.getElementById('video');
      v.paused ? v.play() : v.pause();
    }

    function goLive() {
      if (liveRecording) {
        const recStart = new Date(liveRecording.date).getTime();
        const liveOffset = Math.max(0, (Date.now() - recStart) / 1000 - 5);
        serverSeek(liveOffset);
        return;
      }
      if (!hls) return;
      const v = document.getElementById('video');
      v.currentTime = v.duration || 0;
      v.play().catch(() => {});
      // Force LIVE state immediately — don't wait for timeupdate
      document.getElementById('liveBtn').classList.add('at-live');
    }

    let savedVolume = 1;

    function toggleMute() {
      const v = document.getElementById('video');
      if (v.muted || v.volume === 0) {
        v.muted = false;
        v.volume = savedVolume || 1;
      } else {
        savedVolume = v.volume;
        v.muted = true;
      }
      updateVolumeUI();
    }

    function setVolume(val) {
      const v = document.getElementById('video');
      v.volume = parseFloat(val);
      v.muted = val == 0;
      updateVolumeUI();
    }

    function updateVolumeUI() {
      const v = document.getElementById('video');
      const btn = document.getElementById('muteBtn');
      const slider = document.getElementById('volumeSlider');
      const vol = v.muted ? 0 : v.volume;
      slider.value = vol;
      if (vol === 0) btn.innerHTML = '&#128263;';
      else if (vol < 0.5) btn.innerHTML = '&#128265;';
      else btn.innerHTML = '&#128266;';
    }

    function isFullscreen() {
      return document.fullscreenElement || document.webkitFullscreenElement;
    }

    function toggleFullscreen() {
      const v = document.getElementById('video');
      if (isFullscreen()) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      } else {
        // Try video element fullscreen first (best native macOS behavior),
        // fall back to player area
        const target = v.requestFullscreen ? v : document.querySelector('.player-area');
        const fn = target.requestFullscreen || target.webkitRequestFullscreen;
        if (fn) {
          fn.call(target).catch(err => {
            console.warn('[fullscreen] Failed:', err);
            // Fallback: try the player area
            const pa = document.querySelector('.player-area');
            const fn2 = pa.requestFullscreen || pa.webkitRequestFullscreen;
            if (fn2) fn2.call(pa).catch(() => {});
          });
        }
      }
    }

    function toggleTheater() {
      document.body.classList.toggle('theater');
      const btn = document.getElementById('theaterBtn');
      btn.innerHTML = document.body.classList.contains('theater') ? '&#9635;' : '&#9645;';
    }

    // Update fullscreen button icon
    function onFullscreenChange() {
      document.getElementById('fullscreenBtn').innerHTML = isFullscreen() ? '&#9973;' : '&#9974;';
      // Exit theater when entering fullscreen so they feel different
      if (isFullscreen() && document.body.classList.contains('theater')) {
        document.body.classList.remove('theater');
        document.getElementById('theaterBtn').innerHTML = '&#9645;';
      }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    // Double-click video to toggle fullscreen
    document.getElementById('video').addEventListener('dblclick', toggleFullscreen);

    function fmt(s) {
      if (!isFinite(s) || s < 0) return '0:00';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      return m + ':' + String(sec).padStart(2, '0');
    }

    // Update seek bar and time display
    const video = document.getElementById('video');
    video.addEventListener('timeupdate', updateControls);
    setInterval(updateControls, 1000);  // also update while paused (live buffer grows)
    video.addEventListener('play', () => { document.getElementById('playpause').innerHTML = '&#9208;'; });
    video.addEventListener('pause', () => { document.getElementById('playpause').innerHTML = '&#9654;'; });

    // Buffering spinner
    const bufSpinner = document.getElementById('buffering');
    video.addEventListener('waiting', () => bufSpinner.classList.add('visible'));
    video.addEventListener('playing', () => bufSpinner.classList.remove('visible'));
    video.addEventListener('seeked', () => bufSpinner.classList.remove('visible'));
    video.addEventListener('canplay', () => bufSpinner.classList.remove('visible'));

    function updateControls() {
      const v = document.getElementById('video');
      const seekRow = document.getElementById('seekRow');
      const lb = document.getElementById('liveBtn');
      const liveEdgeEl = document.getElementById('seekLiveEdge');
      const liveLabelEl = document.getElementById('seekLiveLabel');
      const liveAreaEl = document.getElementById('seekLiveArea');

      if (isLive && !liveRecording) {
        // Live mode with rewind buffer
        seekRow.style.display = 'flex';
        liveEdgeEl.style.display = 'none';
        liveLabelEl.style.display = 'none';
        liveAreaEl.style.display = 'none';
        const total = v.duration || 0;
        const current = v.currentTime || 0;
        const lag = total - current;

        document.getElementById('timeCurrent').textContent = fmt(current);
        document.getElementById('timeTotal').textContent = fmt(total);

        const pct = total > 0 ? (current / total) * 100 : 0;
        document.getElementById('seekFill').style.width = pct + '%';
        document.getElementById('seekBuffered').style.width = '100%';

        lb.classList.toggle('at-live', lag < 30);
      } else {
        // Recording mode or live+recording hybrid: show seek bar
        seekRow.style.display = 'flex';
        const current = serverOffset + (v.currentTime || 0);
        const streamEnd = serverOffset + (v.duration || 0);
        const total = Math.max(totalDuration, streamEnd);

        document.getElementById('timeCurrent').textContent = fmt(current);
        document.getElementById('timeTotal').textContent = fmt(total);

        const pct = total > 0 ? (current / total) * 100 : 0;
        document.getElementById('seekFill').style.width = pct + '%';

        const transcoded = serverOffset + (v.duration || 0);
        const bufPct = total > 0 ? (transcoded / total) * 100 : 0;
        document.getElementById('seekBuffered').style.width = Math.min(bufPct, 100) + '%';

        if (liveRecording) {
          const recStart = new Date(liveRecording.date).getTime();
          const liveEdge = (Date.now() - recStart) / 1000;
          const livePct = total > 0 ? Math.min((liveEdge / total) * 100, 100) : 0;

          liveEdgeEl.style.display = 'block';
          liveEdgeEl.style.left = livePct + '%';
          liveLabelEl.style.display = 'block';
          liveLabelEl.style.left = livePct + '%';
          liveAreaEl.style.display = 'block';
          liveAreaEl.style.width = livePct + '%';

          lb.classList.toggle('at-live', liveEdge - current < 15);
        } else {
          liveEdgeEl.style.display = 'none';
          liveLabelEl.style.display = 'none';
          liveAreaEl.style.display = 'none';
        }
      }
    }

    // Hover tooltip on seek bar
    const seekTooltip = document.getElementById('seekTooltip');
    document.getElementById('seekWrap').addEventListener('mousemove', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      if (isLive && !liveRecording) {
        seekTooltip.textContent = fmt(pct * (video.duration || 0));
      } else {
        const total = totalDuration || (serverOffset + (video.duration || 0));
        seekTooltip.textContent = fmt(pct * total);
      }
      seekTooltip.style.left = (pct * 100) + '%';
    });

    // Click on seek bar to jump to position
    document.getElementById('seekWrap').addEventListener('click', (e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;

      if (isLive && !liveRecording) {
        // Live: seek within the stream buffer directly
        video.currentTime = pct * (video.duration || 0);
      } else {
        const total = totalDuration || (serverOffset + (video.duration || 0));
        let target = pct * total;

        // Clamp to live edge
        if (liveRecording) {
          const recStart = new Date(liveRecording.date).getTime();
          const liveEdge = (Date.now() - recStart) / 1000;
          target = Math.min(target, liveEdge - 5);
        }

        const localDur = isFinite(video.duration) ? video.duration : 0;
        if (localDur && target >= serverOffset && target <= serverOffset + localDur) {
          video.currentTime = target - serverOffset;
        } else {
          serverSeek(target);
        }
      }
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key) {
        case ' ': e.preventDefault(); togglePlay(); break;
        case 'ArrowLeft': e.preventDefault(); seekTo(-10); break;
        case 'ArrowRight': e.preventDefault(); seekTo(10); break;
        case 'j': seekTo(-10); break;
        case 'l': seekTo(10); break;
        case 'k': togglePlay(); break;
        case 'f': toggleFullscreen(); break;
        case 't': toggleTheater(); break;
        case 'm': toggleMute(); break;
        case 'Escape': if (document.body.classList.contains('theater')) { document.body.classList.remove('theater'); e.preventDefault(); } break;
      }
    });

    async function waitForPlaylist(url, maxWait = 15000) {
      const start = Date.now();
      while (Date.now() - start < maxWait) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            const text = await res.text();
            if (text.includes('#EXTINF')) return;
          }
        } catch {}
        await new Promise(r => setTimeout(r, 500));
      }
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    let pickerSelection = new Set();

    function openChannelPicker() {
      pickerSelection = new Set(favorites);
      const list = document.getElementById('modalList');
      list.innerHTML = channels.map(ch => {
        const checked = pickerSelection.has(ch.id) ? 'checked' : '';
        const search = `${ch.number} ${ch.name} ${ch.callSign}`.toLowerCase();
        return `<label class="modal-ch" data-search="${esc(search)}">
          <input type="checkbox" value="${esc(ch.id)}" ${checked} onchange="togglePicker(this)">
          <span class="ch-num">${esc(ch.number)}</span>
          <span>${esc(ch.name)}</span>
        </label>`;
      }).join('');
      document.getElementById('modalSearch').value = '';
      document.getElementById('channelModal').classList.add('open');
    }

    function closeChannelPicker() {
      document.getElementById('channelModal').classList.remove('open');
    }

    function filterModal() {
      const q = document.getElementById('modalSearch').value.toLowerCase();
      for (const el of document.getElementById('modalList').children) {
        const text = el.getAttribute('data-search') || '';
        el.style.display = text.includes(q) ? '' : 'none';
      }
    }

    function togglePicker(cb) {
      if (cb.checked) pickerSelection.add(cb.value);
      else pickerSelection.delete(cb.value);
    }

    function selectAllVisible() {
      for (const el of document.getElementById('modalList').children) {
        if (el.style.display === 'none') continue;
        const cb = el.querySelector('input');
        cb.checked = true;
        pickerSelection.add(cb.value);
      }
    }

    function selectNoneVisible() {
      for (const el of document.getElementById('modalList').children) {
        if (el.style.display === 'none') continue;
        const cb = el.querySelector('input');
        cb.checked = false;
        pickerSelection.delete(cb.value);
      }
    }

    async function saveChannelPicker() {
      favorites = [...pickerSelection];
      await fetch('/api/favorites', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(favorites),
      });
      renderChannels();
      closeChannelPicker();
    }

    // --- Guide / EPG ---
    const GUIDE_PX_PER_MIN = 4;
    const GUIDE_WINDOW_HOURS = 4;
    let guideWindowStart = null;

    function escAttr(str) {
      return esc(str).replace(/"/g, '&quot;');
    }

    function renderGuide() {
      if (!guideWindowStart) guideNow();

      const grid = document.getElementById('guideGrid');
      const windowStart = guideWindowStart.getTime();
      const windowEnd = windowStart + GUIDE_WINDOW_HOURS * 3600000;
      const windowMinutes = GUIDE_WINDOW_HOURS * 60;
      const totalWidth = windowMinutes * GUIDE_PX_PER_MIN;

      // Time header
      let timeHtml = '<div class="guide-time-row"><div class="guide-ch-label"></div><div class="guide-programs" style="width:' + totalWidth + 'px">';
      for (let m = 0; m < windowMinutes; m += 30) {
        const t = new Date(windowStart + m * 60000);
        const label = t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        timeHtml += `<div class="guide-time-mark" style="left:${m * GUIDE_PX_PER_MIN}px">${label}</div>`;
      }
      timeHtml += '</div></div>';

      // Now indicator
      const nowMs = Date.now();
      const nowMin = (nowMs - windowStart) / 60000;
      const nowPx = nowMin * GUIDE_PX_PER_MIN;
      const showNowLine = nowMs >= windowStart && nowMs <= windowEnd;

      // Channel rows
      const visible = favorites.length > 0 ? channels.filter(ch => favorites.includes(ch.id)) : channels;
      let rowsHtml = '';

      for (const ch of visible) {
        const airings = guideData[ch.id] || [];
        let progsHtml = '';

        for (const a of airings) {
          const start = new Date(a.datetime).getTime();
          const end = start + (a.duration || 1800) * 1000;
          if (end <= windowStart || start >= windowEnd) continue;

          const visStart = Math.max(start, windowStart);
          const visEnd = Math.min(end, windowEnd);
          const leftMin = (visStart - windowStart) / 60000;
          const widthMin = (visEnd - visStart) / 60000;
          const left = leftMin * GUIDE_PX_PER_MIN;
          const width = widthMin * GUIDE_PX_PER_MIN;

          const isOn = nowMs >= start && nowMs < end;
          const showTitle = a.show?.title || a.title || '';
          const epInfo = a.episode ? `S${a.episode.season?.number || '?'}E${a.episode.episodeNumber || '?'}` : '';
          const tooltip = [showTitle, epInfo, a.description].filter(Boolean).join('\n');

          const showId = a.show?.identifier || '';
          const sEntry = showId ? seriesIndex[showId] : null;
          const isScheduled = sEntry && sEntry.schedule !== 'none';
          const isActiveRec = isOn && isChannelRecording(ch.id);
          const recActive = isScheduled || isActiveRec;
          const recIcon = showId
            ? `<span class="guide-rec-btn${recActive ? ' recording' : ''}" onclick="toggleRecordShow('${escAttr(showId)}', event, '${escAttr(a.datetime)}')" title="${isActiveRec ? 'Recording now' : isScheduled ? 'Scheduled' : 'Record'}">&#9679;</span>`
            : '';

          progsHtml += `<div class="guide-program${isOn ? ' on-now' : ''}" style="left:${left}px;width:${width - 2}px" title="${escAttr(tooltip)}" onclick="playFromGuide('${ch.id}')">
            <div class="guide-prog-text"><span class="guide-prog-title">${esc(showTitle)}</span>${epInfo ? `<span class="guide-prog-ep">${esc(epInfo)}</span>` : ''}</div>${recIcon}
          </div>`;
        }

        rowsHtml += `<div class="guide-row">
          <div class="guide-ch-label"><span class="channel-number">${esc(ch.number)}</span> ${esc(ch.name)}${isChannelRecording(ch.id) ? ' <span class="ch-rec-dot">REC</span>' : ''}</div>
          <div class="guide-programs" style="width:${totalWidth}px">${progsHtml}
            ${showNowLine ? `<div class="guide-now-line" style="left:${nowPx}px"></div>` : ''}
          </div>
        </div>`;
      }

      document.getElementById('guideDate').textContent = guideWindowStart.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      grid.innerHTML = timeHtml + rowsHtml;
    }

    function guideNow() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - 30);
      now.setMinutes(Math.floor(now.getMinutes() / 30) * 30, 0, 0);
      guideWindowStart = now;
      if (currentTab === 'guide') renderGuide();
    }

    function guideNav(hours) {
      if (!guideWindowStart) guideNow();
      guideWindowStart = new Date(guideWindowStart.getTime() + hours * 3600000);
      renderGuide();
    }

    function playFromGuide(channelId) {
      showTab('live');
      const items = document.getElementById('channel-list').children;
      for (const item of items) {
        if (item.dataset.id === channelId) {
          playChannel(channelId, item);
          return;
        }
      }
      playChannel(channelId, null);
    }

    init();
  </script>
</body>
</html>
