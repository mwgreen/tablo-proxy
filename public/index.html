      pickerSelection = new Set(favorites);
      const list = document.getElementById('modalList');
      list.innerHTML = channels.map(ch => {
        const checked = pickerSelection.has(ch.id) ? 'checked' : '';
        const search = `${ch.number} ${ch.name} ${ch.callSign}`.toLowerCase();
        return `<label class="modal-ch" data-search="${esc(search)}">
          <input type="checkbox" value="${esc(ch.id)}" ${checked} onchange="togglePicker(this)">
          <span class="ch-num">${esc(ch.number)}</span>
          <span>${esc(ch.name)}</span>
        </label>`;
      }).join('');
      document.getElementById('modalSearch').value = '';
      document.getElementById('channelModal').classList.add('open');
    }

    function closeChannelPicker() {
      document.getElementById('channelModal').classList.remove('open');
    }

    function filterModal() {
      const q = document.getElementById('modalSearch').value.toLowerCase();
      for (const el of document.getElementById('modalList').children) {
        const text = el.getAttribute('data-search') || '';
        el.style.display = text.includes(q) ? '' : 'none';
      }
    }

    function togglePicker(cb) {
      if (cb.checked) pickerSelection.add(cb.value);
      else pickerSelection.delete(cb.value);
    }

    function selectAllVisible() {
      for (const el of document.getElementById('modalList').children) {
        if (el.style.display === 'none') continue;
        const cb = el.querySelector('input');
        cb.checked = true;
        pickerSelection.add(cb.value);
      }
    }

    function selectNoneVisible() {
      for (const el of document.getElementById('modalList').children) {
        if (el.style.display === 'none') continue;
        const cb = el.querySelector('input');
        cb.checked = false;
        pickerSelection.delete(cb.value);
      }
    }

    async function saveChannelPicker() {
      favorites = [...pickerSelection];
      await fetch('/api/favorites', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(favorites),
      });
      renderChannels();
      closeChannelPicker();
    }

    // --- Guide / EPG ---
    const GUIDE_PX_PER_MIN = 4;
    const GUIDE_WINDOW_HOURS = 4;
    let guideWindowStart = null;

    function escAttr(str) {
      return esc(str).replace(/"/g, '&quot;');
    }

    function renderGuide() {
      if (!guideWindowStart) guideNow();

      const grid = document.getElementById('guideGrid');
      const windowStart = guideWindowStart.getTime();
      const windowEnd = windowStart + GUIDE_WINDOW_HOURS * 3600000;
      const windowMinutes = GUIDE_WINDOW_HOURS * 60;
      const totalWidth = windowMinutes * GUIDE_PX_PER_MIN;

      // Time header
      let timeHtml = '<div class="guide-time-row"><div class="guide-ch-label"></div><div class="guide-programs" style="width:' + totalWidth + 'px">';
      for (let m = 0; m < windowMinutes; m += 30) {
        const t = new Date(windowStart + m * 60000);
        const label = t.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        timeHtml += `<div class="guide-time-mark" style="left:${m * GUIDE_PX_PER_MIN}px">${label}</div>`;
      }
      timeHtml += '</div></div>';

      // Now indicator
      const nowMs = Date.now();
      const nowMin = (nowMs - windowStart) / 60000;
      const nowPx = nowMin * GUIDE_PX_PER_MIN;
      const showNowLine = nowMs >= windowStart && nowMs <= windowEnd;

      // Channel rows
      const visible = favorites.length > 0 ? channels.filter(ch => favorites.includes(ch.id)) : channels;
      let rowsHtml = '';

      for (const ch of visible) {
        const airings = guideData[ch.id] || [];
        let progsHtml = '';

        for (const a of airings) {
          const start = new Date(a.datetime).getTime();
          const end = start + (a.duration || 1800) * 1000;
          if (end <= windowStart || start >= windowEnd) continue;

          const visStart = Math.max(start, windowStart);
          const visEnd = Math.min(end, windowEnd);
          const leftMin = (visStart - windowStart) / 60000;
          const widthMin = (visEnd - visStart) / 60000;
          const left = leftMin * GUIDE_PX_PER_MIN;
          const width = widthMin * GUIDE_PX_PER_MIN;

          const isOn = nowMs >= start && nowMs < end;
          const showTitle = a.show?.title || a.title || '';
          const epInfo = a.episode ? `S${a.episode.season?.number || '?'}E${a.episode.episodeNumber || '?'}` : '';
          const tooltip = [showTitle, epInfo, a.description].filter(Boolean).join('\n');

          const showId = a.show?.identifier || '';
          const sEntry = showId ? seriesIndex[showId] : null;
          const isScheduled = sEntry && sEntry.schedule !== 'none';
          const isActiveRec = isOn && isChannelRecording(ch.id);
          const recActive = isScheduled || isActiveRec;
          const recIcon = showId
            ? `<span class="guide-rec-btn${recActive ? ' recording' : ''}" onclick="toggleRecordShow('${escAttr(showId)}', event, '${escAttr(a.datetime)}', '${escAttr(ch.cloudId || '')}')" title="${isActiveRec ? 'Recording now' : isScheduled ? 'Scheduled' : 'Record'}">&#9679;</span>`
            : '';

          progsHtml += `<div class="guide-program${isOn ? ' on-now' : ''}" style="left:${left}px;width:${width - 2}px" title="${escAttr(tooltip)}" onclick="playFromGuide('${ch.id}')">
            <div class="guide-prog-text"><span class="guide-prog-title">${esc(showTitle)}</span>${epInfo ? `<span class="guide-prog-ep">${esc(epInfo)}</span>` : ''}</div>${recIcon}
          </div>`;
        }

        rowsHtml += `<div class="guide-row">
          <div class="guide-ch-label"><span class="channel-number">${esc(ch.number)}</span> ${esc(ch.name)}${isChannelRecording(ch.id) ? ' <span class="ch-rec-dot">REC</span>' : ''}</div>
          <div class="guide-programs" style="width:${totalWidth}px">${progsHtml}
            ${showNowLine ? `<div class="guide-now-line" style="left:${nowPx}px"></div>` : ''}
          </div>
        </div>`;
      }

      document.getElementById('guideDate').textContent = guideWindowStart.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      grid.innerHTML = timeHtml + rowsHtml;
    }

    function guideNow() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - 30);
      now.setMinutes(Math.floor(now.getMinutes() / 30) * 30, 0, 0);
      guideWindowStart = now;
      if (currentTab === 'guide') renderGuide();
    }

    function guideNav(hours) {
      if (!guideWindowStart) guideNow();
      guideWindowStart = new Date(guideWindowStart.getTime() + hours * 3600000);
      renderGuide();
    }

    async function refreshGuide(btn) {
      const orig = btn.textContent;
      btn.textContent = 'Refreshing...';
      btn.disabled = true;
      try {
        await fetch('/api/refresh?guide=1', { method: 'POST' });
        const [gRes, sRes] = await Promise.all([fetch('/api/guide'), fetch('/api/series')]);
        guideData = await gRes.json();
        seriesIndex = await sRes.json();
        renderGuide();
      } catch (e) {
        console.warn('Guide refresh failed:', e);
      } finally {
        btn.textContent = orig;
        btn.disabled = false;
      }
    }

    function playFromGuide(channelId) {
      showTab('live');
      const items = document.getElementById('channel-list').children;
      for (const item of items) {
        if (item.dataset.id === channelId) {
          playChannel(channelId, item);
          return;
        }
      }
      playChannel(channelId, null);
    }

    init();
  </script>
</body>
</html>
