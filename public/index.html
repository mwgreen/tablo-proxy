<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0c0e14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Tablo TV</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='9' fill='%23e94560'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #0c0e14;
      --surface: #13161f;
      --surface-2: #1a1e2b;
      --surface-3: #232838;
      --border: rgba(255,255,255,0.07);
      --text: #f2f3f7;
      --text-dim: #9aa0b0;
      --text-faint: #666d80;
      --accent: #e94560;
      --accent-soft: rgba(233,69,96,0.14);
      --radius: 10px;
      --header-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    button { touch-action: manipulation; font-family: inherit; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ---------------- Header ---------------- */
    header {
      background: var(--surface); height: var(--header-h);
      padding: 0 max(20px, env(safe-area-inset-left)) 0 max(20px, env(safe-area-inset-right));
      display: flex; align-items: center; gap: 20px;
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: baseline; gap: 8px; }
    .brand h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .brand h1::before {
      content: ''; display: inline-block; width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent); margin-right: 8px; vertical-align: 1px;
      box-shadow: 0 0 8px rgba(233,69,96,0.7);
    }
    .brand .build { font-size: 10px; color: var(--text-faint); font-weight: 400; }
    header nav {
      display: flex; gap: 2px; background: var(--surface-2);
      padding: 3px; border-radius: 9px;
    }
    header nav button {
      background: none; border: none; color: var(--text-dim);
      padding: 6px 16px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600;
      transition: color 0.15s, background 0.15s;
    }
    header nav button:hover { color: var(--text); }
    header nav button.active { background: var(--surface-3); color: var(--text); }

    /* ---------------- Layout ---------------- */
    .container { display: flex; height: calc(100vh - var(--header-h)); }

    .sidebar {
      width: 340px; min-width: 340px; overflow-y: auto;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-search {
      padding: 10px 12px; position: sticky; top: 0; background: var(--surface); z-index: 5;
      display: flex; gap: 8px; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px; outline: none; min-width: 0;
    }
    .sidebar-search input:focus { border-color: rgba(233,69,96,0.5); }
    .sidebar-search input::placeholder { color: var(--text-faint); }
    .gear-btn {
      background: none; border: none; color: var(--text-faint); font-size: 19px;
      cursor: pointer; padding: 6px; line-height: 1; border-radius: 6px;
    }
    .gear-btn:hover { color: var(--text); background: var(--surface-2); }

    /* ---------------- List items ---------------- */
    .channel-item, .recording-item {
      padding: 11px 14px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
      position: relative;
    }
    .channel-item:hover, .recording-item:hover { background: var(--surface-2); }
    .channel-item.active, .recording-item.active {
      background: var(--accent-soft); border-left-color: var(--accent);
    }
    .channel-number {
      display: inline-block; font-weight: 700; font-size: 12px; color: var(--accent);
      background: var(--accent-soft); border-radius: 5px; padding: 2px 7px;
      margin-right: 9px; font-variant-numeric: tabular-nums;
    }
    .channel-name { font-weight: 600; font-size: 14px; }
    .channel-now { font-size: 12.5px; color: var(--text-dim); margin-top: 3px; padding-left: 2px; }

    .recording-title { font-weight: 600; font-size: 14px; padding-right: 72px; }
    .recording-episode { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .recording-meta { font-size: 11.5px; color: var(--text-faint); margin-top: 3px; }
    .rec-actions {
      position: absolute; top: 8px; right: 8px; display: flex; gap: 2px;
    }
    .rec-delete-btn, .rec-stop-btn {
      color: var(--text-faint); font-size: 13px; cursor: pointer;
      padding: 6px 8px; line-height: 1; border-radius: 6px;
    }
    .rec-delete-btn:hover, .rec-stop-btn:hover { color: var(--accent); background: var(--surface-3); }
    .resume-bar {
      height: 3px; background: var(--surface-3); border-radius: 2px; margin-top: 7px; overflow: hidden;
    }
    .resume-bar i { display: block; height: 100%; background: var(--accent); border-radius: 2px; }

    .rec-live-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 700; color: #fff;
      background: var(--accent); padding: 2px 6px; border-radius: 4px;
      margin-right: 7px; letter-spacing: 0.6px; vertical-align: 1px;
    }
    .rec-live-badge::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%; background: #fff;
      animation: rec-pulse 1.5s ease-in-out infinite;
    }
    @keyframes rec-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .ch-rec-dot {
      color: var(--accent); font-size: 9.5px; font-weight: 800; margin-left: 7px;
      text-transform: uppercase; letter-spacing: 0.6px;
      animation: rec-pulse 1.5s ease-in-out infinite;
    }

    /* ---------------- Player area ---------------- */
    .player-area {
      flex: 1; display: flex; background: #000; position: relative; min-width: 0;
    }
    video { width: 100%; flex: 1; background: #000; min-height: 0; }

    .status, .loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: var(--text-faint); font-size: 15px; text-align: center; z-index: 5;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .status svg { width: 44px; height: 44px; opacity: 0.4; }
    .status.hidden, .loading.hidden { display: none; }
    .loading { color: var(--text-dim); }
    .loading .spinner, .buffering .spinner {
      width: 42px; height: 42px; border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .buffering {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      display: none; z-index: 10; pointer-events: none;
    }
    .buffering.visible { display: block; }
    .error-msg {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(20,10,14,0.92); border: 1px solid rgba(233,69,96,0.4);
      color: #ff8fa3; font-size: 13.5px; padding: 10px 16px; border-radius: 9px;
      max-width: 85%; text-align: center; z-index: 40; display: none;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .error-msg.visible { display: block; }

    /* ---------------- Player UI overlay ---------------- */
    .player-ui {
      position: absolute; inset: 0; z-index: 20; display: none;
      pointer-events: none;
      opacity: 1; transition: opacity 0.25s ease;
    }
    .player-ui.visible { display: block; }
    .player-area.hide-ui .player-ui { opacity: 0; }
    .player-area.hide-ui { cursor: none; }
    .player-area.hide-ui .player-top,
    .player-area.hide-ui .player-bottom { pointer-events: none !important; }

    .player-top {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 14px max(18px, env(safe-area-inset-right)) 40px max(18px, env(safe-area-inset-left));
      background: linear-gradient(to bottom, rgba(0,0,0,0.72), rgba(0,0,0,0));
      pointer-events: auto;
    }
    .np-title { font-size: 15.5px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    .np-sub { font-size: 12.5px; color: rgba(255,255,255,0.75); margin-top: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

    .player-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 34px max(16px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: linear-gradient(to top, rgba(0,0,0,0.82), rgba(0,0,0,0));
      pointer-events: auto;
      display: flex; flex-direction: column; gap: 4px;
    }

    /* ---- Seek bar ---- */
    .seek-row { display: flex; align-items: center; gap: 12px; }
    .time-label {
      font-size: 12.5px; color: rgba(255,255,255,0.85); font-variant-numeric: tabular-nums;
      white-space: nowrap; text-shadow: 0 1px 2px rgba(0,0,0,0.8); min-width: 40px;
    }
    .time-label.right { text-align: right; }
    .seek-wrap {
      flex: 1; height: 28px; position: relative; cursor: pointer;
      display: flex; align-items: center; touch-action: none;
    }
    .seek-track {
      width: 100%; height: 4px; background: rgba(255,255,255,0.22); border-radius: 2px;
      position: relative; overflow: hidden; transition: height 0.12s;
    }
    .seek-wrap:hover .seek-track, .seek-wrap.scrubbing .seek-track { height: 6px; }
    .seek-buffered {
      height: 100%; background: rgba(255,255,255,0.3); border-radius: 2px;
      position: absolute; left: 0; top: 0; width: 0;
    }
    .seek-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      position: absolute; left: 0; top: 0; width: 0;
    }
    .seek-thumb {
      position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
      background: #fff; transform: translate(-50%, -50%) scale(0);
      transition: transform 0.12s; pointer-events: none; z-index: 2;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .seek-wrap:hover .seek-thumb, .seek-wrap.scrubbing .seek-thumb { transform: translate(-50%, -50%) scale(1); }
    .seek-bubble {
      position: absolute; bottom: 26px; transform: translateX(-50%);
      background: rgba(12,14,20,0.92); color: #fff; font-size: 12px; font-weight: 600;
      padding: 4px 9px; border-radius: 6px; pointer-events: none;
      white-space: nowrap; display: none; font-variant-numeric: tabular-nums;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .seek-bubble.visible { display: block; }

    /* ---- Control buttons row ---- */
    .btn-row { display: flex; align-items: center; gap: 4px; }
    .btn-row .spacer { flex: 1; }
    .ctl {
      background: none; border: none; color: #fff; cursor: pointer;
      width: 42px; height: 42px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      opacity: 0.92; transition: opacity 0.12s, background 0.12s;
    }
    .ctl:hover { opacity: 1; background: rgba(255,255,255,0.12); }
    .ctl svg { width: 24px; height: 24px; fill: currentColor; }
    .ctl.play-btn svg { width: 30px; height: 30px; }
    .ctl .icon-alt { display: none; }

    #playpause.playing .icon-main { display: none; }
    #playpause.playing .icon-alt { display: block; }
    #muteBtn.muted .icon-main { display: none; }
    #muteBtn.muted .icon-alt { display: block; }
    #fullscreenBtn.fs .icon-main { display: none; }
    #fullscreenBtn.fs .icon-alt { display: block; }

    .live-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.14); border: none; color: rgba(255,255,255,0.85);
      font-size: 11.5px; font-weight: 800; letter-spacing: 0.8px;
      padding: 7px 12px; border-radius: 999px; cursor: pointer; margin-left: 8px;
      text-transform: uppercase; transition: background 0.15s, color 0.15s;
    }
    .live-btn .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.55);
      transition: background 0.15s;
    }
    .live-btn.at-live { background: var(--accent); color: #fff; }
    .live-btn.at-live .live-dot { background: #fff; animation: rec-pulse 1.6s ease-in-out infinite; }
    .live-btn:not(.at-live):hover { background: rgba(255,255,255,0.25); color: #fff; }
    .live-btn.hidden { display: none; }

    .ctl.rec-btn { color: rgba(255,255,255,0.6); }
    .ctl.rec-btn svg { width: 20px; height: 20px; }
    .ctl.rec-btn:hover { color: var(--accent); }
    .ctl.rec-btn.recording { color: var(--accent); }
    .ctl.rec-btn.recording svg { animation: rec-pulse 1.6s ease-in-out infinite; }
    .ctl.rec-btn.hidden { display: none; }

    .volume-group { display: flex; align-items: center; }
    .volume-slider {
      width: 78px; height: 4px; cursor: pointer; margin-right: 6px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.25); border-radius: 2px; outline: none;
      accent-color: var(--accent);
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      background: #fff; border-radius: 50%; cursor: pointer;
    }
    @media (hover: none) {
      .volume-group { display: none; }   /* phones use hardware volume */
      #theaterBtn { display: none; }
      .seek-thumb { transform: translate(-50%, -50%) scale(1); }  /* always show on touch */
      .seek-track { height: 5px; }
    }

    /* Theater mode */
    body.theater .sidebar { display: none; }
    body.theater header { display: none; }
    body.theater .container { height: 100vh; height: 100dvh; }

    /* Fullscreen */
    .player-area:fullscreen, .player-area:-webkit-full-screen { background: #000; }
    .player-area:fullscreen video, .player-area:-webkit-full-screen video {
      width: 100%; height: 100%; object-fit: contain;
    }
    video:fullscreen, video:-webkit-full-screen {
      width: 100%; height: 100%; object-fit: contain;
    }

    /* ---------------- Modal ---------------- */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      z-index: 100; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; width: 500px; max-width: calc(100vw - 32px);
      max-height: 80vh; display: flex; flex-direction: column;
      box-shadow: 0 18px 50px rgba(0,0,0,0.6);
    }
    .modal h2 { font-size: 15px; margin-bottom: 12px; font-weight: 700; }
    .modal-search {
      width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 10px; outline: none;
    }
    .modal-search:focus { border-color: rgba(233,69,96,0.5); }
    .modal-list { flex: 1; overflow-y: auto; max-height: 50vh; }
    .modal-ch {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      cursor: pointer; border-radius: 8px;
    }
    .modal-ch:hover { background: var(--surface-2); }
    .modal-ch input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .modal-ch .ch-num { font-weight: 700; color: var(--accent); min-width: 44px; font-size: 13px; font-variant-numeric: tabular-nums; }
    .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .modal-actions button {
      padding: 7px 18px; border-radius: 8px; cursor: pointer; font-size: 13.5px; font-weight: 600;
      border: 1px solid var(--border); background: none; color: var(--text-dim);
    }
    .modal-actions button:hover { color: var(--text); background: var(--surface-2); }
    .modal-actions button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .modal-actions button.primary:hover { background: #f05a73; }

    /* ---------------- Guide ---------------- */
    .guide-container {
      height: calc(100vh - var(--header-h)); overflow: hidden; display: flex; flex-direction: column;
    }
    .guide-toolbar {
      display: flex; align-items: center; gap: 8px; padding: 10px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .guide-toolbar button {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    .guide-toolbar button:hover { background: var(--surface-2); color: var(--text); }
    #guideDate { color: var(--text-dim); font-size: 13px; margin-left: auto; }
    .guide-grid { flex: 1; overflow: auto; }
    .guide-time-row, .guide-row { display: flex; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .guide-ch-label {
      width: 110px; min-width: 110px; padding: 8px 10px; font-size: 13px;
      background: var(--surface); position: sticky; left: 0; z-index: 2;
      display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .guide-time-row .guide-ch-label { border-bottom: 1px solid var(--border); }
    .guide-programs { position: relative; height: 52px; flex-shrink: 0; }
    .guide-time-row .guide-programs { height: 30px; }
    .guide-time-mark {
      position: absolute; top: 0; font-size: 11px; color: var(--text-faint); padding: 6px 8px;
      border-left: 1px solid rgba(255,255,255,0.07); height: 100%;
    }
    .guide-program {
      position: absolute; top: 3px; height: calc(100% - 6px);
      background: var(--surface-2); border-radius: 6px; padding: 4px 8px;
      overflow: hidden; cursor: pointer; font-size: 12px;
      display: flex; flex-direction: row; align-items: center;
      border: 1px solid var(--border);
    }
    .guide-prog-text { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .guide-program:hover { background: var(--surface-3); border-color: rgba(255,255,255,0.2); z-index: 1; }
    .guide-program.on-now { background: rgba(233,69,96,0.12); border-color: rgba(233,69,96,0.5); }
    .guide-prog-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guide-prog-ep { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .guide-now-line {
      position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 1;
      pointer-events: none; box-shadow: 0 0 6px rgba(233,69,96,0.6);
    }
    .guide-rec-btn {
      flex-shrink: 0; font-size: 14px; color: var(--text-faint); cursor: pointer;
      margin-left: 4px; line-height: 1; padding: 2px;
    }
    .guide-rec-btn:hover { color: var(--accent); }
    .guide-rec-btn.recording { color: var(--accent); }

    /* ---------------- Rec menu ---------------- */
    .rec-menu {
      position: fixed; z-index: 200; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 5px; min-width: 190px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.55);
    }
    .rec-menu button {
      display: block; width: 100%; text-align: left; padding: 9px 12px; border-radius: 7px;
      background: none; border: none; color: var(--text); font-size: 13.5px; cursor: pointer;
    }
    .rec-menu button:hover { background: var(--surface-3); }
    .rec-menu button.danger { color: var(--accent); }

    /* ---------------- Mobile / touch layout ---------------- */
    @media (max-width: 700px) {
      html, body { height: auto; }
      header {
        height: auto; padding: 10px max(14px, env(safe-area-inset-right)) 10px max(14px, env(safe-area-inset-left));
        gap: 12px; flex-wrap: wrap;
        padding-top: max(10px, env(safe-area-inset-top));
      }
      .brand h1 { font-size: 15px; }
      header nav { margin-left: auto; }
      header nav button { padding: 7px 12px; font-size: 12.5px; }

      /* Stack the video above the channel/recording list */
      .container { flex-direction: column; height: auto; }
      .player-area {
        flex: none; width: 100%; order: -1;   /* video on top, list below */
        position: sticky; top: 0; z-index: 30;
      }
      video { flex: none; width: 100%; height: auto; aspect-ratio: 16 / 9; }

      .sidebar {
        width: 100%; min-width: 0; flex: none;
        overflow-y: visible; border-right: none;
      }
      .sidebar-search { position: static; }

      /* Larger touch targets in the lists */
      .channel-item, .recording-item { padding: 14px; }
      .rec-actions { top: 10px; }
      .rec-delete-btn, .rec-stop-btn { padding: 9px 11px; font-size: 14px; }

      /* Overlay controls: tighter paddings, larger tap targets */
      .player-top { padding: 10px 14px 30px; }
      .np-title { font-size: 14px; }
      .player-bottom { padding: 26px 12px 8px; }
      .ctl { width: 44px; height: 44px; }
      .btn-row { gap: 0; }
      .live-btn { margin-left: 4px; padding: 8px 12px; }
      .time-label { min-width: 34px; font-size: 12px; }
      .seek-row { gap: 8px; }

      /* Guide stays horizontally scrollable, just tighter */
      .guide-container { height: calc(100dvh - 58px); }
      .guide-ch-label { width: 78px; min-width: 78px; font-size: 12px; padding: 6px; }
    }

    /* Phone held in landscape while a stream is playing -> immersive fullscreen
       video. CSS-driven (no Fullscreen API) so it works on iOS, which blocks
       programmatic fullscreen without a user gesture. max-height targets phones
       (short in landscape) without catching tablets/laptops. */
    @media (orientation: landscape) and (max-height: 500px) {
      body.has-stream header,
      body.has-stream .sidebar { display: none; }
      body.has-stream .container { height: 100dvh; }
      body.has-stream .player-area {
        position: fixed; inset: 0; order: 0;
        width: 100vw; height: 100dvh; z-index: 50;
      }
      body.has-stream video {
        width: 100%; height: 100%; aspect-ratio: auto; object-fit: contain;
      }
      body.has-stream .player-bottom {
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
      body.has-stream .player-top {
        padding-left: max(20px, env(safe-area-inset-left));
        padding-right: max(20px, env(safe-area-inset-right));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Tablo</h1>
      <span class="build">build 11</span>
    </div>
    <nav>
      <button id="btn-live" class="active" onclick="showTab('live')">Live TV</button>
      <button id="btn-recordings" onclick="showTab('recordings')">Recordings</button>
      <button id="btn-guide" onclick="showTab('guide')">Guide</button>
    </nav>
  </header>

  <div class="container">
    <div class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="search" placeholder="Search..." oninput="filterList()">
        <button class="gear-btn" onclick="openChannelPicker()" title="Edit channels">&#9881;</button>
      </div>
      <div id="channel-list"></div>
      <div id="recording-list" style="display:none"></div>
    </div>
    <div class="player-area" id="playerArea">
      <video id="video" autoplay playsinline webkit-playsinline></video>
      <div class="status" id="status">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
        <span>Select a channel or recording to start watching</span>
      </div>
      <div class="loading hidden" id="loading"><div class="spinner"></div><span id="loadingText">Loading stream...</span></div>
      <div class="error-msg" id="error"></div>
      <div class="buffering" id="buffering"><div class="spinner"></div></div>

      <div class="player-ui" id="controls">
        <div class="player-top">
          <div class="np-title" id="npTitle"></div>
          <div class="np-sub" id="npSub"></div>
        </div>
        <div class="player-bottom">
          <div class="seek-row" id="seekRow">
            <span class="time-label" id="timeCurrent">0:00</span>
            <div class="seek-wrap" id="seekWrap">
              <div class="seek-track">
                <div class="seek-buffered" id="seekBuffered"></div>
                <div class="seek-fill" id="seekFill"></div>
              </div>
              <div class="seek-thumb" id="seekThumb"></div>
              <div class="seek-bubble" id="seekBubble">0:00</div>
            </div>
            <span class="time-label right" id="timeTotal">0:00</span>
          </div>
          <div class="btn-row">
            <button class="ctl play-btn" onclick="togglePlay()" id="playpause" title="Play/Pause (space)">
              <svg class="icon-main" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              <svg class="icon-alt" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctl" onclick="seekTo(-10)" title="Back 10 seconds">
              <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/><text x="12" y="16.5" text-anchor="middle" font-size="7.5" font-weight="bold" fill="currentColor" stroke="none" font-family="inherit">10</text></svg>
            </button>
            <button class="ctl" onclick="seekTo(30)" title="Forward 30 seconds">
              <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6h2c0 4.4-3.6 8-8 8s-8-3.6-8-8 3.6-8 8-8z"/><text x="12" y="16.5" text-anchor="middle" font-size="7.5" font-weight="bold" fill="currentColor" stroke="none" font-family="inherit">30</text></svg>
            </button>
            <button class="live-btn hidden" id="liveBtn" onclick="goLive()" title="Jump to live">
              <span class="live-dot"></span>LIVE
            </button>
            <button class="ctl rec-btn hidden" id="recBtn" onclick="toggleRecord(event)" title="Record">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
            </button>
            <span class="spacer"></span>
            <span class="volume-group">
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
              <button class="ctl" onclick="toggleMute()" id="muteBtn" title="Mute (m)">
                <svg class="icon-main" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg class="icon-alt" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
              </button>
            </span>
            <button class="ctl" onclick="toggleTheater()" id="theaterBtn" title="Theater mode (t)">
              <svg viewBox="0 0 24 24"><path d="M19 6H5c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 10H5V8h14v8z"/></svg>
            </button>
            <button class="ctl" onclick="toggleFullscreen()" id="fullscreenBtn" title="Fullscreen (f)">
              <svg class="icon-main" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              <svg class="icon-alt" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="guide-container" id="guide-container" style="display:none">
    <div class="guide-toolbar">
      <button onclick="guideNav(-3)">&laquo; 3h</button>
      <button onclick="guideNow()">Now</button>
      <button onclick="guideNav(3)">3h &raquo;</button>
      <button onclick="refreshGuide(this)">Refresh</button>
      <span id="guideDate"></span>
    </div>
    <div class="guide-grid" id="guideGrid"></div>
  </div>

  <div class="modal-overlay" id="channelModal" onclick="if(event.target===this)closeChannelPicker()">
    <div class="modal">
      <h2>Select Channels</h2>
      <input type="text" class="modal-search" id="modalSearch" placeholder="Filter..." oninput="filterModal()">
      <div class="modal-list" id="modalList"></div>
      <div class="modal-actions">
        <button onclick="selectAllVisible()">All</button>
        <button onclick="selectNoneVisible()">None</button>
        <button class="primary" onclick="saveChannelPicker()">Save</button>
      </div>
    </div>
  </div>

  <script>
    let channels = [];
    let recordings = [];
    let guideData = {};
    let currentTab = 'live';
    let hls = null;
    let currentSessionId = null;
    let totalDuration = 0;     // full recording duration from metadata (seconds)
    let serverOffset = 0;      // where FFmpeg started transcoding from (seconds)
    let isLive = false;
    let liveRecording = null; // non-null when watching a live channel that's being recorded
    let favorites = []; // empty = show all
    let currentRecordingId = null;
    let currentChannelId = null;  // numeric channel id we're playing live
    let seriesIndex = {}; // cloudShowId -> { path, title, schedule }
    let currentShowId = null; // cloud show ID of what's playing live
    let tunerStatus = []; // active tuner info from device

    const isTouch = window.matchMedia('(hover: none)').matches;

    // Resume position tracking — save to localStorage every 5 seconds
    function saveResumePosition() {
      if (!currentRecordingId) return;
      const v = document.getElementById('video');
      const pos = serverOffset + (v.currentTime || 0);
      if (pos > 5) localStorage.setItem('resume_' + currentRecordingId, String(Math.floor(pos)));
    }
    function getResumePosition(recordingId) {
      return parseInt(localStorage.getItem('resume_' + recordingId) || '0', 10);
    }
    function saveWatchState() {
      const state = { tab: currentTab };
      if (currentRecordingId) {
        state.recordingId = currentRecordingId;
      } else {
        const activeCh = document.querySelector('.channel-item.active');
        if (activeCh) state.channelId = activeCh.dataset.id;
      }
      localStorage.setItem('watchState', JSON.stringify(state));
    }
    setInterval(() => { saveResumePosition(); saveWatchState(); }, 5000);
    window.addEventListener('beforeunload', () => { saveResumePosition(); saveWatchState(); });

    // Keep the server-side transcode session alive while a stream is loaded
    // (paused or playing). Without this, a paused player stops requesting
    // segments, the server's 5-min inactivity timer fires, ffmpeg is killed
    // and the segment dir is rm -rf'd — so resume plays only the in-memory
    // MSE buffer (~30-90s) before 404'ing.
    setInterval(() => {
      if (currentSessionId) {
        fetch(`/hls/${currentSessionId}/stream.m3u8`, { method: 'HEAD' }).catch(() => {});
      }
    }, 60000);

    async function init() {
      try {
        const [chRes, recRes, guideRes, favRes, seriesRes, tunerRes] = await Promise.all([
          fetch('/api/channels'),
          fetch('/api/recordings'),
          fetch('/api/guide'),
          fetch('/api/favorites'),
          fetch('/api/series'),
          fetch('/api/tuners'),
        ]);
        channels = await chRes.json();
        recordings = await recRes.json();
        guideData = await guideRes.json();
        favorites = await favRes.json();
        seriesIndex = await seriesRes.json();
        const tuners = await tunerRes.json().catch(() => []);
        tunerStatus = Array.isArray(tuners) ? tuners : [];
      } catch (e) {
        showError('Failed to load data: ' + e.message);
      }
      renderChannels();
      renderRecordings();

      // Restore last watch state on refresh
      try {
        const saved = JSON.parse(localStorage.getItem('watchState') || '{}');
        if (saved.tab) showTab(saved.tab);
        if (saved.recordingId) {
          const rec = recordings.find(r => String(r.id) === String(saved.recordingId));
          if (rec) {
            const el = document.querySelector(`.recording-item[data-id="${saved.recordingId}"]`);
            playRecording(saved.recordingId, rec.duration, el || document.createElement('div'));
          }
        } else if (saved.channelId) {
          const el = document.querySelector(`.channel-item[data-id="${saved.channelId}"]`);
          if (el) playChannel(saved.channelId, el);
        }
      } catch (e) {
        console.warn('Failed to restore watch state:', e);
      }
    }

    function esc(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function renderChannels() {
      const list = document.getElementById('channel-list');
      const visible = favorites.length > 0 ? channels.filter(ch => favorites.includes(ch.id)) : channels;
      list.innerHTML = visible.map(ch => {
        const now = getCurrentAiring(ch.id);
        const rec = isChannelRecording(ch.id);
        const search = `${ch.number} ${ch.name} ${ch.callSign}`.toLowerCase();
        const active = String(ch.id) === String(currentChannelId) ? ' active' : '';
        return `<div class="channel-item${active}" data-id="${ch.id}" data-search="${esc(search)}" onclick="playChannel('${esc(ch.id)}', this)">
          <div><span class="channel-number">${esc(ch.number)}</span><span class="channel-name">${esc(ch.name)}</span>${rec ? '<span class="ch-rec-dot">REC</span>' : ''}</div>
          ${now ? `<div class="channel-now">${esc(now)}</div>` : ''}
        </div>`;
      }).join('');
    }

    function renderRecordings() {
      const list = document.getElementById('recording-list');
      const now = Date.now();
      // Sort in-progress recordings to the top so they're easy to find
      const sorted = recordings.slice().sort((a, b) => {
        const aLive = isInProgress(a, now) ? 1 : 0;
        const bLive = isInProgress(b, now) ? 1 : 0;
        if (aLive !== bLive) return bLive - aLive;
        return 0;
      });
      list.innerHTML = sorted.map(rec => {
        const date = rec.date ? new Date(rec.date).toLocaleDateString() : '';
        const dur = rec.duration ? Math.round(rec.duration / 60) + ' min' : '';
        const resume = getResumePosition(rec.id);
        const hasResume = resume > 10 && rec.duration && resume < rec.duration - 30;
        const meta = [rec.channel, date, dur].filter(Boolean).join(' · ');
        const epInfo = rec.seasonNumber && rec.episodeNumber
          ? `S${rec.seasonNumber}E${rec.episodeNumber}: ${rec.episode}`
          : rec.episode;
        const search = `${rec.title} ${rec.episode}`.toLowerCase();
        const inProgress = isInProgress(rec, now);
        const liveBadge = inProgress
          ? '<span class="rec-live-badge" title="Recording now">REC</span>'
          : '';
        // For in-progress recordings, show a Stop button (■) next to the X
        // delete. Stop ends the capture but keeps the partial file; X
        // deletes everything (including any partial).
        const stopBtn = inProgress
          ? `<span class="rec-stop-btn" onclick="stopRec('${rec.id}', event)" title="Stop recording (keep partial)">&#9632;</span>`
          : '';
        return `<div class="recording-item" data-id="${rec.id}" data-search="${esc(search)}" data-duration="${rec.duration}" onclick="playRecording('${rec.id}', ${rec.duration}, this)">
          <div class="rec-actions">${stopBtn}<span class="rec-delete-btn" onclick="deleteRec('${rec.id}', event)" title="Delete recording">&#10005;</span></div>
          <div class="recording-title">${liveBadge}${esc(rec.title)}</div>
          ${epInfo ? `<div class="recording-episode">${esc(epInfo)}</div>` : ''}
          ${meta ? `<div class="recording-meta">${esc(meta)}</div>` : ''}
          ${hasResume ? `<div class="resume-bar" title="Resume at ${fmt(resume)}"><i style="width:${Math.min(100, (resume / rec.duration) * 100)}%"></i></div>` : ''}
        </div>`;
      }).join('');
    }

    function isInProgress(rec, now) {
      if (!rec.date || !rec.duration) return false;
      const start = new Date(rec.date).getTime();
      return now >= start && now < start + rec.duration * 1000;
    }

    function getCurrentAiring(channelId) {
      const airings = guideData[channelId];
      if (!airings || !airings.length) return null;
      const now = Date.now();
      const current = airings.find(a => {
        const start = new Date(a.datetime || a.start).getTime();
        const end = start + ((a.duration || 1800) * 1000);
        return now >= start && now <= end;
      });
      return current ? (current.title || current.series_title || '') : null;
    }

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('btn-live').classList.toggle('active', tab === 'live');
      document.getElementById('btn-recordings').classList.toggle('active', tab === 'recordings');
      document.getElementById('btn-guide').classList.toggle('active', tab === 'guide');

      const mainContainer = document.querySelector('.container');
      const guideContainer = document.getElementById('guide-container');

      if (tab === 'guide') {
        mainContainer.style.display = 'none';
        guideContainer.style.display = 'flex';
        renderGuide();
      } else {
        mainContainer.style.display = 'flex';
        guideContainer.style.display = 'none';
        document.getElementById('channel-list').style.display = tab === 'live' ? 'block' : 'none';
        document.getElementById('recording-list').style.display = tab === 'recordings' ? 'block' : 'none';
        document.getElementById('search').value = '';
        filterList();
        if (tab === 'recordings') refreshRecordings();
      }
    }

    async function refreshRecordings() {
      try {
        await fetch('/api/refresh', { method: 'POST' });
        const res = await fetch('/api/recordings');
        recordings = await res.json();
        renderRecordings();
      } catch (e) {
        console.warn('Failed to refresh recordings:', e);
      }
    }

    function filterList() {
      const q = document.getElementById('search').value.toLowerCase();
      const listId = currentTab === 'live' ? 'channel-list' : 'recording-list';
      const items = document.getElementById(listId).children;
      for (const item of items) {
        const text = item.getAttribute('data-search') || '';
        item.style.display = text.includes(q) ? '' : 'none';
      }
    }

    // Pull fresh recordings + tuner state and re-render whatever tab is
    // visible. Used after delete / stop / record so REC badges and the
    // channel list reflect reality without waiting for the 15s poll.
    async function refreshAll() {
      try {
        await fetch('/api/refresh', { method: 'POST' });
        const [recsRes, tunRes] = await Promise.all([
          fetch('/api/recordings'),
          fetch('/api/tuners'),
        ]);
        const newRecs = await recsRes.json();
        recordings.length = 0;
        recordings.push(...newRecs);
        tunerStatus = await tunRes.json();
        updateRecBtn();
        if (currentTab === 'live') renderChannels();
        if (currentTab === 'guide') renderGuide();
        if (currentTab === 'recordings') renderRecordings();
      } catch (e) {}
    }

    // Locally clear any tuner entries that point at the just-deleted/stopped
    // recording. /server/tuners on the device takes a few seconds to flush
    // after a DELETE, so without this the live-tv tab would still show a
    // REC badge until the next refresh catches up.
    function dropTunerForRecording(recPath) {
      if (!recPath) return;
      tunerStatus = tunerStatus.map(t =>
        t.recording === recPath ? { ...t, in_use: false, recording: null, channel: null, channel_identifier: null } : t
      );
    }

    async function deleteRec(recordingId, event) {
      event.stopPropagation();
      const rec = recordings.find(r => String(r.id) === String(recordingId));
      const name = rec ? `${rec.title}${rec.episode ? ' - ' + rec.episode : ''}` : 'this recording';
      if (!confirm(`Delete ${name}?`)) return;
      try {
        await fetch('/api/recording/' + recordingId, { method: 'DELETE' });
        // Optimistic local update — drop the recording from our list and
        // free its tuner slot. Tablo's tuner state lags the DELETE by a
        // few seconds, so reading /api/tuners right now would still show
        // it recording. Re-render immediately, then do a follow-up
        // authoritative refresh once the device has caught up.
        recordings = recordings.filter(r => String(r.id) !== String(recordingId));
        dropTunerForRecording(rec?.path);
        if (currentTab === 'live') renderChannels();
        if (currentTab === 'guide') renderGuide();
        if (currentTab === 'recordings') renderRecordings();
        setTimeout(refreshAll, 3000);
      } catch (e) {
        console.error('Delete failed:', e);
      }
    }

    async function stopRec(recordingId, event) {
      event.stopPropagation();
      const rec = recordings.find(r => String(r.id) === String(recordingId));
      const name = rec ? `${rec.title}${rec.episode ? ' - ' + rec.episode : ''}` : 'this recording';
      if (!confirm(`Stop recording ${name}? (Keeps what's been recorded so far.)`)) return;
      try {
        const res = await fetch('/api/recording/' + recordingId + '/stop', { method: 'POST' });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        // Stop keeps the recording in the list (with the partial), but the
        // tuner is freed. Drop the tuner binding optimistically.
        dropTunerForRecording(rec?.path);
        if (currentTab === 'live') renderChannels();
        if (currentTab === 'guide') renderGuide();
        if (currentTab === 'recordings') renderRecordings();
        setTimeout(refreshAll, 3000);
      } catch (e) {
        console.error('Stop failed:', e);
      }
    }

    function isChannelRecording(channelId) {
      return Array.isArray(tunerStatus) && tunerStatus.some(t => t.in_use && t.recording && t.channel === '/guide/channels/' + channelId);
    }

    async function refreshTuners() {
      try {
        const safe = Array.isArray(tunerStatus) ? tunerStatus : [];
        const before = JSON.stringify(safe.map(t => t.recording));
        const fresh = await (await fetch('/api/tuners')).json().catch(() => []);
        tunerStatus = Array.isArray(fresh) ? fresh : [];
        const after = JSON.stringify(tunerStatus.map(t => t.recording));
        // If the set of in-progress recordings changed, re-render so REC
        // badges appear/disappear without waiting for a manual refresh.
        if (before !== after) {
          updateRecBtn();
          if (currentTab === 'live') renderChannels();
          if (currentTab === 'guide') renderGuide();
          // Also pull a fresh recordings list so a newly-started recording
          // shows up in the recordings tab too.
          try {
            await fetch('/api/refresh', { method: 'POST' });
            const r = await fetch('/api/recordings');
            const newRecs = await r.json();
            recordings.length = 0;
            recordings.push(...newRecs);
            if (currentTab === 'recordings') renderRecordings();
          } catch {}
        }
      } catch (e) {}
    }
    setInterval(refreshTuners, 15000);

    function updateRecBtn() {
      const btn = document.getElementById('recBtn');
      if (!isLive || !currentShowId) {
        btn.classList.add('hidden');
        return;
      }
      btn.classList.remove('hidden');
      const entry = seriesIndex[currentShowId];
      const seriesScheduled = entry && entry.schedule !== 'none';
      // Red = THIS airing is actually capturing right now (tuner has a
      // recording on the active channel). Series-level schedule alone is
      // not enough — Tablo may be skipping this airing for conflicts or
      // dedup reasons. Reflected via tooltip instead.
      const isCapturing = currentChannelId != null && isChannelRecording(currentChannelId);
      btn.classList.toggle('recording', isCapturing);
      btn.title = isCapturing
        ? 'Recording now'
        : seriesScheduled
          ? 'Series scheduled — click to manage'
          : 'Record this show';
    }

    function toggleRecord(event) {
      if (!currentShowId) return;
      let airingDatetime = null;
      let channelIdentifier = null;
      if (currentChannelId != null) {
        const ch = channels.find(c => String(c.id) === String(currentChannelId));
        if (ch) channelIdentifier = ch.cloudId || null;
        const airings = guideData[currentChannelId] || guideData[String(currentChannelId)] || [];
        const now = Date.now();
        const current = airings.find(a => {
          const start = new Date(a.datetime).getTime();
          return now >= start && now <= start + (a.duration || 1800) * 1000;
        });
        if (current) airingDatetime = current.datetime;
      }
      toggleRecordShow(currentShowId, event || { clientX: 200, clientY: 200, stopPropagation(){}, preventDefault(){} }, airingDatetime, channelIdentifier);
    }

    function closeRecMenu() {
      const old = document.getElementById('recMenu');
      if (old) old.remove();
      document.removeEventListener('click', closeRecMenu);
    }

    function toggleRecordShow(showId, event, airingDatetime, channelIdentifier) {
      if (event) { event.stopPropagation(); event.preventDefault(); }
      closeRecMenu();

      const entry = seriesIndex[showId];
      const isSeriesRec = entry && entry.schedule !== 'none';

      const menu = document.createElement('div');
      menu.className = 'rec-menu';
      menu.id = 'recMenu';

      let html = '';
      if (airingDatetime) {
        const chArg = channelIdentifier ? `'${escAttr(channelIdentifier)}'` : 'null';
        html += `<button onclick="doRecordAction('single', '${escAttr(showId)}', '${escAttr(airingDatetime)}', ${chArg})">Record this episode</button>`;
      }
      if (isSeriesRec) {
        html += `<button class="danger" onclick="doRecordAction('cancel-series', '${escAttr(showId)}')">Cancel series recording</button>`;
      } else {
        html += `<button onclick="doRecordAction('series-new', '${escAttr(showId)}')">Record new episodes</button>`;
        html += `<button onclick="doRecordAction('series-all', '${escAttr(showId)}')">Record all episodes</button>`;
      }
      menu.innerHTML = html;

      // Position near the click
      menu.style.left = Math.min(event.clientX, window.innerWidth - 200) + 'px';
      menu.style.top = Math.min(event.clientY, window.innerHeight - 150) + 'px';
      document.body.appendChild(menu);
      setTimeout(() => document.addEventListener('click', closeRecMenu), 0);
    }

    async function doRecordAction(action, showId, datetime, channelIdentifier) {
      closeRecMenu();
      const entry = seriesIndex[showId];
      try {
        if (action === 'single') {
          const res = await fetch('/api/record-airing', { method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ showId, datetime, channelIdentifier })
          });
          const data = await res.json();
          if (data.error) { showError(data.error); return; }
        } else if (action === 'series-new' || action === 'series-all') {
          const rule = action === 'series-new' ? 'new' : 'all';
          const res = await fetch('/api/record/' + encodeURIComponent(showId), { method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rule })
          });
          const data = await res.json();
          if (data.error) { showError(data.error); return; }
          if (entry) entry.schedule = rule;
        } else if (action === 'cancel-series') {
          const res = await fetch('/api/record/' + encodeURIComponent(showId), { method: 'DELETE' });
          const data = await res.json();
          if (data.error) { showError(data.error); return; }
          if (entry) entry.schedule = 'none';
        }
        updateRecBtn();
        // Tablo takes a few seconds to register a new schedule on its tuner,
        // so refresh once immediately and again after a short delay so the
        // new entry / REC badge appears without the user needing to reload.
        await refreshAll();
        setTimeout(refreshAll, 5000);
      } catch (e) {
        console.error('Record action failed:', e);
      }
    }

    function setNowPlaying(title, sub) {
      document.getElementById('npTitle').textContent = title || '';
      document.getElementById('npSub').textContent = sub || '';
    }

    async function playChannel(channelId, el) {
      clearActive();
      if (el) el.classList.add('active');
      currentChannelId = channelId;
      isLive = true;
      liveRecording = null;
      currentShowId = null;

      // Find what's on now and set currentShowId for the record button
      const ch = channels.find(c => c.id === channelId || String(c.id) === String(channelId));
      let airingTitle = '';
      if (ch) {
        const now = Date.now();
        liveRecording = recordings.find(r => {
          if (!r.channel.startsWith(ch.number + ' ')) return false;
          const start = new Date(r.date).getTime();
          const end = start + r.duration * 1000;
          return now >= start && now <= end;
        }) || null;

        // Find current airing's show ID for recording
        const airings = guideData[ch.id] || [];
        const currentAiring = airings.find(a => {
          const start = new Date(a.datetime || a.start).getTime();
          const end = start + ((a.duration || 1800) * 1000);
          return now >= start && now <= end;
        });
        if (currentAiring?.show?.identifier) {
          currentShowId = currentAiring.show.identifier;
        }
        airingTitle = currentAiring ? (currentAiring.show?.title || currentAiring.title || '') : '';
      }
      setNowPlaying(ch ? `${ch.number} · ${ch.name}` : 'Live TV', airingTitle);
      updateRecBtn();

      if (liveRecording) {
        // Play the recording stream seeked to the live edge
        totalDuration = liveRecording.duration;
        currentRecordingId = liveRecording.id;
        const recStart = new Date(liveRecording.date).getTime();
        const liveOffset = Math.max(0, (Date.now() - recStart) / 1000 - 5);
        await playRecordingAtOffset(liveRecording.id, liveOffset);
      } else {
        totalDuration = 0;
        serverOffset = 0;
        await playHls(`/stream/hls/channel/${channelId}`);
      }
    }

    async function playRecordingAtOffset(recordingId, offset) {
      const video = document.getElementById('video');
      const loading = document.getElementById('loading');
      const status = document.getElementById('status');

      status.classList.add('hidden');
      setLoading('Loading stream...');
      clearError();

      if (hls) { hls.destroy(); hls = null; }

      try {
        const res = await fetch(`/stream/hls/recording/${recordingId}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        currentSessionId = data.sessionId;

        // Seek to the live offset
        setLoading('Seeking to live...');
        const seekRes = await fetch(`/api/seek/${currentSessionId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ offset }),
        });
        const seekData = await seekRes.json();
        serverOffset = seekData.startOffset;

        setLoading('Preparing stream...');
        await waitForPlaylist(seekData.url);
        loadHls(seekData.url, video, loading);
      } catch (e) {
        hideLoading();
        showError('Failed to start stream: ' + e.message);
      }
    }

    async function playRecording(recordingId, duration, el) {
      clearActive();
      el.classList.add('active');
      totalDuration = duration;
      currentRecordingId = recordingId;
      currentShowId = null;
      updateRecBtn();

      // Detect if this recording is currently in progress
      const rec = recordings.find(r => String(r.id) === String(recordingId));
      if (rec) {
        const now = Date.now();
        const start = new Date(rec.date).getTime();
        const end = start + rec.duration * 1000;
        if (now >= start && now <= end) {
          isLive = true;
          liveRecording = rec;
        } else {
          isLive = false;
          liveRecording = null;
        }
        const epInfo = rec.seasonNumber && rec.episodeNumber
          ? `S${rec.seasonNumber}E${rec.episodeNumber}: ${rec.episode}`
          : rec.episode;
        setNowPlaying(rec.title, [epInfo, rec.channel].filter(Boolean).join(' · '));
      } else {
        isLive = false;
        liveRecording = null;
        setNowPlaying('', '');
      }

      const resume = getResumePosition(recordingId);
      if (resume > 10 && resume < duration - 30) {
        serverOffset = resume;
        await playHls(`/stream/hls/recording/${recordingId}?offset=${resume}`);
      } else {
        serverOffset = 0;
        await playHls(`/stream/hls/recording/${recordingId}`);
      }
    }

    function clearActive() {
      saveResumePosition();
      currentRecordingId = null;
      currentChannelId = null;
      document.querySelectorAll('.channel-item, .recording-item').forEach(el => el.classList.remove('active'));
    }

    // Re-open the current stream after the server-side session expired.
    // Position is preserved via serverOffset + video.currentTime (the
    // absolute offset within the recording / channel timeline).
    let recovering = false;
    async function recoverExpiredSession() {
      if (recovering) return;
      recovering = true;
      try {
        const v = document.getElementById('video');
        const pos = serverOffset + (v.currentTime || 0);
        console.log('[hls.js] Server session expired — re-opening at', pos);
        if (currentRecordingId) {
          await playRecordingAtOffset(currentRecordingId, pos);
        } else if (currentChannelId) {
          await playHls(`/stream/hls/channel/${currentChannelId}`);
        }
      } finally {
        setTimeout(() => { recovering = false; }, 3000);
      }
    }

    function setLoading(text) {
      const loading = document.getElementById('loading');
      document.getElementById('loadingText').textContent = text;
      loading.classList.remove('hidden');
    }
    function hideLoading() {
      const loading = document.getElementById('loading');
      loading.classList.add('hidden');
      document.getElementById('loadingText').textContent = 'Loading stream...';
    }

    async function playHls(endpoint) {
      const video = document.getElementById('video');
      const status = document.getElementById('status');
      const loading = document.getElementById('loading');

      status.classList.add('hidden');
      setLoading('Loading stream...');
      clearError();

      if (hls) {
        hls.destroy();
        hls = null;
      }

      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        if (data.error) {
          hideLoading();
          showError(data.error);
          return;
        }

        currentSessionId = data.sessionId;
        const playlistUrl = data.url;

        setLoading('Preparing stream...');
        await waitForPlaylist(playlistUrl);

        loadHls(playlistUrl, video, loading);
      } catch (e) {
        hideLoading();
        showError('Failed to start stream: ' + e.message);
      }
    }

    function onStreamReady() {
      hideLoading();
      document.getElementById('controls').classList.add('visible');
      document.body.classList.add('has-stream');
      showUI();
    }

    function loadHls(playlistUrl, _ignoredVideo, loading) {
      // Fresh <video> element each open so iOS native HLS lands at the live
      // edge (a reused element clings to the old position). Also destroys hls.
      const video = freshVideo();

      // A live channel streams a sliding-window LIVE playlist (player tracks
      // the live edge automatically). A recording streams an append-only EVENT
      // playlist where we start at the produced offset.
      const liveChannel = !!currentChannelId && !currentRecordingId;

      if (Hls.isSupported()) {
        hls = new Hls(liveChannel
          ? {
              // Live channel: let hls.js detect the live playlist and start at
              // the live edge (a few segments back), tracking it as it grows.
              maxBufferLength: 30,
              liveSyncDurationCount: 3,
              backBufferLength: 90,
            }
          : {
              maxBufferLength: 30,
              maxMaxBufferLength: 60,
              // EVENT playlist: pin to 0 so a post-seek load starts at the
              // requested offset (serverOffset maps it to the absolute
              // position) rather than hls.js's default live-edge guess.
              startPosition: 0,
              backBufferLength: Infinity,
            });
        hls.loadSource(playlistUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          onStreamReady();
          const lb = document.getElementById('liveBtn');
          if (isLive) {
            lb.classList.remove('hidden');
            lb.classList.add('at-live');
            // Live channel: hls.js already opened at the live edge — nothing to
            // do. In-progress recording (EVENT): jump to the produced edge.
            if (!liveChannel && liveRecording) {
              const recStart = new Date(liveRecording.date).getTime();
              const liveEdge = (Date.now() - recStart) / 1000;
              if (liveEdge - serverOffset >= 30) lb.classList.remove('at-live');
              else video.currentTime = video.duration || 0;
            }
          } else {
            lb.classList.add('hidden');
          }
          video.play().catch(() => {});
        });
        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error('[hls.js]', data.type, data.details, data.reason || '', data.err || '');
          if (data.fatal) {
            if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
              console.log('[hls.js] Attempting media error recovery...');
              hls.recoverMediaError();
            } else if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
              // 404 on playlist/fragment means the server-side session was
              // cleaned up (keepalive failed — e.g. laptop slept past the
              // inactivity window, or the server restarted). Re-open the
              // stream at the current playback position.
              const status = data.response?.code || data.networkDetails?.status;
              if (status === 404 && (currentRecordingId || currentChannelId)) {
                recoverExpiredSession();
                return;
              }
              // Preserve current position on recovery — startLoad() with no
              // arg falls back to startPosition (0), snapping playback to
              // the start of the playlist.
              console.log('[hls.js] Attempting network error recovery...');
              hls.startLoad(video.currentTime || 0);
            } else {
              showError('Stream error: ' + data.type + ' (' + data.details + ')');
              hideLoading();
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native HLS (iOS Safari).
        video.src = playlistUrl;
        video.addEventListener('loadedmetadata', () => {
          onStreamReady();
          const lb = document.getElementById('liveBtn');
          if (isLive) {
            lb.classList.remove('hidden');
            lb.classList.add('at-live');
            // No seek here: the server positions the playlist start correctly
            // (live edge for a channel, live offset for an in-progress
            // recording), so native HLS opens live. An in-place seek on iOS
            // tends to snap to the DVR-window start instead.
          } else {
            lb.classList.add('hidden');
          }
          video.play().catch(() => {});
        }, { once: true });
      }
    }

    // Seek a <video> to the live edge. We OVERSHOOT past the seekable end
    // rather than seeking to exactly seekable.end: on Safari/iOS, seeking past
    // the end snaps to the live edge AND triggers the player's live resync —
    // seeking to a finite end value can instead leave iOS clamped at the
    // buffered start (the "Live button jumps to the beginning" bug). hls.js and
    // desktop browsers clamp the overshoot back to the seekable end. seekable
    // may be empty right after load, so retry as it populates.
    function seekToLiveEdge(video) {
      const go = () => {
        try {
          const s = video.seekable;
          if (s && s.length) { video.currentTime = s.end(s.length - 1) + 60; return true; }
          if (isFinite(video.duration) && video.duration > 0) { video.currentTime = video.duration + 60; return true; }
        } catch (e) {}
        return false;
      };
      if (go()) return;
      const onReady = () => { if (go()) cleanup(); };
      const cleanup = () => {
        video.removeEventListener('progress', onReady);
        video.removeEventListener('canplay', onReady);
        video.removeEventListener('durationchange', onReady);
      };
      video.addEventListener('progress', onReady);
      video.addEventListener('canplay', onReady);
      video.addEventListener('durationchange', onReady);
      setTimeout(cleanup, 8000);
    }

    // ---------- Unified timeline model ----------
    // One source of truth for the seek bar / time labels / live chip across
    // the three playback modes:
    //   channel  — live channel, sliding DVR window (seekable range)
    //   liveRec  — in-progress recording; timeline grows in real time to the
    //              live edge, position is serverOffset + currentTime
    //   vod      — finished recording, fixed duration
    function getTimeline() {
      const v = video;
      if (isLive && !liveRecording) {
        const sk = v.seekable;
        const start = sk && sk.length ? sk.start(0) : 0;
        const end = sk && sk.length ? sk.end(sk.length - 1) : (isFinite(v.duration) ? v.duration : (v.currentTime || 0));
        let buffered = end;
        try { if (v.buffered.length) buffered = v.buffered.end(v.buffered.length - 1); } catch {}
        return { mode: 'channel', start, end, pos: v.currentTime || 0, edge: end, buffered };
      }
      if (liveRecording) {
        const recStart = new Date(liveRecording.date).getTime();
        const pos = serverOffset + (v.currentTime || 0);
        const edge = Math.max(0, (Date.now() - recStart) / 1000, pos);
        return { mode: 'liveRec', start: 0, end: edge, pos, edge, buffered: serverOffset + (v.duration || 0) };
      }
      const end = Math.max(totalDuration || 0, serverOffset + (v.duration || 0));
      return { mode: 'vod', start: 0, end, pos: serverOffset + (v.currentTime || 0), edge: null, buffered: serverOffset + (v.duration || 0) };
    }

    // Seek relative (skip +/- seconds)
    function seekTo(delta) {
      showUI();
      const v = document.getElementById('video');
      const currentAbsolute = serverOffset + (v.currentTime || 0);

      let maxPos = totalDuration || Infinity;
      if (liveRecording) {
        const recStart = new Date(liveRecording.date).getTime();
        maxPos = (Date.now() - recStart) / 1000 - 5;
      }

      const targetAbsolute = Math.max(0, Math.min(maxPos, currentAbsolute + delta));
      const targetLocal = targetAbsolute - serverOffset;

      // Check what's actually buffered
      const bufEnd = v.buffered.length > 0 ? v.buffered.end(v.buffered.length - 1) : 0;
      const bufStart = v.buffered.length > 0 ? v.buffered.start(0) : 0;

      if (targetLocal >= bufStart && targetLocal <= bufEnd) {
        v.currentTime = targetLocal;
      } else if (targetLocal >= 0 && targetLocal <= bufEnd + 2) {
        v.currentTime = Math.max(0, bufEnd - 0.5);
      } else if (isLive && !liveRecording && targetLocal > bufEnd) {
        v.currentTime = Math.max(0, bufEnd - 0.5);
      } else {
        serverSeek(targetAbsolute);
      }
    }

    // Seek to absolute position in the recording
    async function serverSeek(absoluteSeconds) {
      if (!currentSessionId) return;

      setLoading('Seeking...');

      if (hls) { hls.destroy(); hls = null; }

      try {
        const res = await fetch(`/api/seek/${currentSessionId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ offset: absoluteSeconds }),
        });
        const data = await res.json();
        serverOffset = data.startOffset;

        await waitForPlaylist(data.url);
        loadHls(data.url, document.getElementById('video'), document.getElementById('loading'));
      } catch (e) {
        hideLoading();
        showError('Seek failed: ' + e.message);
      }
    }

    function togglePlay() {
      const v = document.getElementById('video');
      v.paused ? v.play() : v.pause();
    }

    function goLive() {
      showUI();
      if (liveRecording) {
        // In-progress recording: restart the transcode at the live offset. The
        // new session's playlist begins there, so it opens live on every
        // engine (no fragile in-place seek).
        const recStart = new Date(liveRecording.date).getTime();
        const liveOffset = Math.max(0, (Date.now() - recStart) / 1000 - 5);
        serverSeek(liveOffset);
        return;
      }
      // Seek to the live edge of BUFFERED data — the only forward seek iOS
      // native HLS honors. Seeking to the unbuffered seekable.end (or
      // reopening) snaps to the DVR-window start. This is exactly what the
      // working +60s skip does (it clamps to buffered.end - 0.5).
      const v = document.getElementById('video');
      document.getElementById('liveBtn').classList.add('at-live');
      if (v.buffered.length) {
        v.currentTime = v.buffered.end(v.buffered.length - 1) - 0.5;
      } else if (hls) {
        seekToLiveEdge(v);
      }
      v.play().catch(() => {});
    }

    let savedVolume = 1;

    function toggleMute() {
      const v = document.getElementById('video');
      if (v.muted || v.volume === 0) {
        v.muted = false;
        v.volume = savedVolume || 1;
      } else {
        savedVolume = v.volume;
        v.muted = true;
      }
      updateVolumeUI();
    }

    function setVolume(val) {
      const v = document.getElementById('video');
      v.volume = parseFloat(val);
      v.muted = val == 0;
      updateVolumeUI();
    }

    function updateVolumeUI() {
      const v = document.getElementById('video');
      const btn = document.getElementById('muteBtn');
      const slider = document.getElementById('volumeSlider');
      const vol = v.muted ? 0 : v.volume;
      slider.value = vol;
      btn.classList.toggle('muted', vol === 0);
    }

    function isFullscreen() {
      return document.fullscreenElement || document.webkitFullscreenElement;
    }

    function toggleFullscreen() {
      const v = document.getElementById('video');
      if (isFullscreen()) {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      } else {
        // iOS Safari (iPhone) exposes only the native video fullscreen API —
        // elements have no requestFullscreen/webkitRequestFullscreen there.
        if (!v.requestFullscreen && !v.webkitRequestFullscreen && v.webkitEnterFullscreen) {
          v.webkitEnterFullscreen();
          return;
        }
        // Fullscreen the player area so our custom overlay controls stay
        // available (video-element fullscreen would show native controls only).
        const pa = document.querySelector('.player-area');
        const fn = pa.requestFullscreen || pa.webkitRequestFullscreen;
        if (fn) {
          fn.call(pa).catch(err => {
            console.warn('[fullscreen] Failed:', err);
            const fn2 = v.requestFullscreen || v.webkitRequestFullscreen;
            if (fn2) fn2.call(v).catch(() => {});
          });
        }
      }
    }

    function toggleTheater() {
      document.body.classList.toggle('theater');
    }

    // Update fullscreen button icon
    function onFullscreenChange() {
      document.getElementById('fullscreenBtn').classList.toggle('fs', !!isFullscreen());
      // Exit theater when entering fullscreen so they feel different
      if (isFullscreen() && document.body.classList.contains('theater')) {
        document.body.classList.remove('theater');
      }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);

    function fmt(s) {
      if (!isFinite(s) || s < 0) return '0:00';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      return m + ':' + String(sec).padStart(2, '0');
    }

    // ---------- Auto-hide overlay controls ----------
    const playerArea = document.getElementById('playerArea');
    let uiHideTimer = null;

    function showUI() {
      playerArea.classList.remove('hide-ui');
      scheduleHideUI();
    }
    function hideUI() {
      const v = document.getElementById('video');
      if (v.paused || scrubbing) return;   // keep controls while paused/scrubbing
      playerArea.classList.add('hide-ui');
    }
    function scheduleHideUI() {
      clearTimeout(uiHideTimer);
      uiHideTimer = setTimeout(hideUI, 3000);
    }
    playerArea.addEventListener('pointermove', (e) => {
      if (e.pointerType === 'mouse') showUI();
    });
    playerArea.addEventListener('pointerdown', (e) => {
      // Any interaction with the controls keeps them visible a while longer
      if (e.target.closest('.player-top') || e.target.closest('.player-bottom')) showUI();
    });

    // All persistent <video> listeners, bundled so they can be re-bound when
    // the element is recreated (see freshVideo).
    const bufSpinner = document.getElementById('buffering');
    function bindVideoListeners(el) {
      el.addEventListener('timeupdate', updateControls);
      el.addEventListener('play', () => {
        document.getElementById('playpause').classList.add('playing');
        scheduleHideUI();
      });
      el.addEventListener('pause', () => {
        document.getElementById('playpause').classList.remove('playing');
        playerArea.classList.remove('hide-ui');
        clearTimeout(uiHideTimer);
      });
      el.addEventListener('waiting', () => bufSpinner.classList.add('visible'));
      el.addEventListener('playing', () => bufSpinner.classList.remove('visible'));
      el.addEventListener('seeked', () => bufSpinner.classList.remove('visible'));
      el.addEventListener('canplay', () => bufSpinner.classList.remove('visible'));
      el.addEventListener('volumechange', updateVolumeUI);
      if (isTouch) {
        // Touch: tap the video toggles the control overlay (like YouTube)
        el.addEventListener('click', () => {
          if (playerArea.classList.contains('hide-ui')) showUI();
          else hideUI();
        });
      } else {
        // Mouse: click = play/pause, double-click = fullscreen
        el.addEventListener('click', () => { togglePlay(); showUI(); });
        el.addEventListener('dblclick', toggleFullscreen);
      }
    }

    // Update seek bar and time display
    let video = document.getElementById('video');
    bindVideoListeners(video);
    setInterval(updateControls, 1000);  // also update while paused (live buffer grows)

    // Swap in a brand-new <video> element (re-binding listeners) and return it.
    // iOS native HLS does NOT reset to the live edge when a <video> element is
    // reused — it clings to the old position, which is why a channel switch or
    // the Live button kept landing at the start of the DVR window while a full
    // page reload always went live. Recreating the element per stream open
    // reproduces the page-reload behavior. Also tears down any hls.js instance.
    function freshVideo() {
      if (hls) { hls.destroy(); hls = null; }
      const old = document.getElementById('video');
      const fresh = document.createElement('video');
      fresh.id = 'video';
      fresh.autoplay = true;
      fresh.setAttribute('playsinline', '');
      fresh.setAttribute('webkit-playsinline', '');
      fresh.muted = old.muted;
      fresh.volume = old.volume;
      old.replaceWith(fresh);
      bindVideoListeners(fresh);
      video = fresh;
      return fresh;
    }

    function updateControls() {
      const t = getTimeline();
      const lb = document.getElementById('liveBtn');
      const span = Math.max(0, t.end - t.start);
      const current = Math.max(0, t.pos - t.start);

      document.getElementById('timeTotal').textContent = fmt(span);

      if (!scrubbing) {
        document.getElementById('timeCurrent').textContent = fmt(current);
        const pct = span > 0 ? Math.min(100, (current / span) * 100) : 0;
        document.getElementById('seekFill').style.width = pct + '%';
        document.getElementById('seekThumb').style.left = pct + '%';
        const bufPct = span > 0 ? Math.min(100, ((t.buffered - t.start) / span) * 100) : 0;
        document.getElementById('seekBuffered').style.width = Math.max(0, bufPct) + '%';
      }

      if (t.edge != null) {
        const lag = t.edge - t.pos;
        lb.classList.toggle('at-live', lag < (t.mode === 'channel' ? 30 : 15));
      }
    }

    // ---------- Seek bar scrubbing (pointer events: mouse + touch) ----------
    const seekWrap = document.getElementById('seekWrap');
    const seekBubble = document.getElementById('seekBubble');
    let scrubbing = false;

    function scrubFraction(e) {
      const rect = seekWrap.getBoundingClientRect();
      return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    }

    function updateScrubUI(pct) {
      const t = getTimeline();
      const span = Math.max(0, t.end - t.start);
      document.getElementById('seekFill').style.width = (pct * 100) + '%';
      document.getElementById('seekThumb').style.left = (pct * 100) + '%';
      seekBubble.style.left = (pct * 100) + '%';
      seekBubble.textContent = fmt(pct * span);
      seekBubble.classList.add('visible');
      document.getElementById('timeCurrent').textContent = fmt(pct * span);
    }

    function commitSeek(pct) {
      const t = getTimeline();
      if (t.mode === 'channel') {
        // Live channel: seek within the DVR window (the seekable range).
        video.currentTime = t.start + pct * Math.max(0, t.end - t.start);
        return;
      }
      let target = pct * t.end;
      // Clamp to just behind the live edge for an in-progress recording
      if (t.mode === 'liveRec') target = Math.min(target, t.edge - 5);
      target = Math.max(0, target);

      const localDur = isFinite(video.duration) ? video.duration : 0;
      if (localDur && target >= serverOffset && target <= serverOffset + localDur) {
        video.currentTime = target - serverOffset;
      } else {
        serverSeek(target);
      }
    }

    seekWrap.addEventListener('pointerdown', (e) => {
      if (!document.getElementById('controls').classList.contains('visible')) return;
      scrubbing = true;
      seekWrap.classList.add('scrubbing');
      seekWrap.setPointerCapture(e.pointerId);
      updateScrubUI(scrubFraction(e));
      e.preventDefault();
    });
    seekWrap.addEventListener('pointermove', (e) => {
      if (scrubbing) {
        updateScrubUI(scrubFraction(e));
        showUI();
      } else if (e.pointerType === 'mouse') {
        // Hover preview bubble
        const t = getTimeline();
        const pct = scrubFraction(e);
        seekBubble.style.left = (pct * 100) + '%';
        seekBubble.textContent = fmt(pct * Math.max(0, t.end - t.start));
        seekBubble.classList.add('visible');
      }
    });
    seekWrap.addEventListener('pointerup', (e) => {
      if (!scrubbing) return;
      scrubbing = false;
      seekWrap.classList.remove('scrubbing');
      seekBubble.classList.remove('visible');
      commitSeek(scrubFraction(e));
      showUI();
    });
    seekWrap.addEventListener('pointercancel', () => {
      scrubbing = false;
      seekWrap.classList.remove('scrubbing');
      seekBubble.classList.remove('visible');
    });
    seekWrap.addEventListener('pointerleave', () => {
      if (!scrubbing) seekBubble.classList.remove('visible');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key) {
        case ' ': e.preventDefault(); togglePlay(); showUI(); break;
        case 'ArrowLeft': e.preventDefault(); seekTo(-10); break;
        case 'ArrowRight': e.preventDefault(); seekTo(10); break;
        case 'j': seekTo(-10); break;
        case 'l': seekTo(10); break;
        case 'k': togglePlay(); showUI(); break;
        case 'f': toggleFullscreen(); break;
        case 't': toggleTheater(); break;
        case 'm': toggleMute(); break;
        case 'Escape': if (document.body.classList.contains('theater')) { document.body.classList.remove('theater'); e.preventDefault(); } break;
      }
    });

    async function waitForPlaylist(url, maxWait = 15000) {
      const start = Date.now();
      while (Date.now() - start < maxWait) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            const text = await res.text();
            if (text.includes('#EXTINF')) return;
          }
        } catch {}
        await new Promise(r => setTimeout(r, 500));
      }
    }

    let errorTimer = null;
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(errorTimer);
      errorTimer = setTimeout(() => el.classList.remove('visible'), 8000);
    }
    function clearError() {
      const el = document.getElementById('error');
      el.textContent = '';
      el.classList.remove('visible');
      clearTimeout(errorTimer);
    }

    let pickerSelection = new Set();

    function openChannelPicker() {
